<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="grayG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="violetG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="indigoG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowUp" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 10 L 5 0 L 10 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="420" rx="14" fill="#f8fafc"/>

  <!-- Title -->
  <text x="350" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">CLAUDE.md 六层优先级</text>
  <text x="350" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">从全局管理员策略到团队共享记忆，优先级递增</text>

  <!-- Priority arrow on left -->
  <line x1="24" y1="370" x2="24" y2="85" stroke="#10b981" stroke-width="2" marker-end="url(#arrowUp)"/>
  <text x="24" y="390" text-anchor="middle" font-size="9" fill="#64748b">优先级递增</text>

  <!-- L1: Managed -->
  <g filter="url(#shadow)">
    <rect x="50" y="78" width="600" height="46" rx="8" fill="white" stroke="#64748b" stroke-width="1.5"/>
  </g>
  <rect x="50" y="78" width="6" height="46" rx="3" fill="url(#grayG)"/>
  <text x="74" y="100" font-size="13" font-weight="700" fill="#475569">1. Managed</text>
  <text x="630" y="100" font-size="10" fill="#94a3b8" text-anchor="end">/etc/claude-code/CLAUDE.md</text>
  <text x="74" y="116" font-size="10" fill="#64748b">管理员策略，对所有用户和项目生效</text>

  <!-- L2: User -->
  <g filter="url(#shadow)">
    <rect x="50" y="136" width="600" height="46" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <rect x="50" y="136" width="6" height="46" rx="3" fill="url(#blueG)"/>
  <text x="74" y="158" font-size="13" font-weight="700" fill="#1d4ed8">2. User</text>
  <text x="630" y="158" font-size="10" fill="#94a3b8" text-anchor="end">~/.claude/CLAUDE.md</text>
  <text x="74" y="174" font-size="10" fill="#64748b">用户私有全局指令，对所有项目生效</text>

  <!-- L3: Project -->
  <g filter="url(#shadow)">
    <rect x="50" y="194" width="600" height="46" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="50" y="194" width="6" height="46" rx="3" fill="url(#greenG)"/>
  <text x="74" y="216" font-size="13" font-weight="700" fill="#047857">3. Project</text>
  <text x="630" y="216" font-size="10" fill="#94a3b8" text-anchor="end">CLAUDE.md / .claude/rules/*.md</text>
  <text x="74" y="232" font-size="10" fill="#64748b">项目指令，提交到代码库；支持条件规则（glob 匹配）</text>

  <!-- L4: Local -->
  <g filter="url(#shadow)">
    <rect x="50" y="252" width="600" height="46" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="50" y="252" width="6" height="46" rx="3" fill="url(#amberG)"/>
  <text x="74" y="274" font-size="13" font-weight="700" fill="#92400e">4. Local</text>
  <text x="630" y="274" font-size="10" fill="#94a3b8" text-anchor="end">CLAUDE.local.md</text>
  <text x="74" y="290" font-size="10" fill="#64748b">用户私有项目指令，不提交到 Git</text>

  <!-- L5: AutoMem -->
  <g filter="url(#shadow)">
    <rect x="50" y="310" width="600" height="46" rx="8" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <rect x="50" y="310" width="6" height="46" rx="3" fill="url(#violetG)"/>
  <text x="74" y="332" font-size="13" font-weight="700" fill="#5b21b6">5. AutoMem</text>
  <text x="630" y="332" font-size="10" fill="#94a3b8" text-anchor="end">.claude/memory/memory.md</text>
  <text x="74" y="348" font-size="10" fill="#64748b">自动记忆，模型自动记录的项目经验和偏好</text>

  <!-- L6: TeamMem -->
  <g filter="url(#shadow)">
    <rect x="50" y="368" width="600" height="46" rx="8" fill="white" stroke="#6366f1" stroke-width="1.5"/>
  </g>
  <rect x="50" y="368" width="6" height="46" rx="3" fill="url(#indigoG)"/>
  <text x="74" y="390" font-size="13" font-weight="700" fill="#4338ca">6. TeamMem</text>
  <text x="630" y="390" font-size="10" fill="#94a3b8" text-anchor="end">.claude/memory/team.md</text>
  <text x="74" y="406" font-size="10" fill="#64748b">团队共享记忆，优先级最高</text>
</svg>
