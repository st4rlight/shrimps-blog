  <rect width="1600" height="1200" fill="url(#bgBase)"/>
  <g filter="url(#blurA)">
    <ellipse cx="260" cy="210" rx="280" ry="220" fill="url(#pinkGlow)"/>
    <ellipse cx="1330" cy="200" rx="300" ry="230" fill="url(#blueGlow)"/>
