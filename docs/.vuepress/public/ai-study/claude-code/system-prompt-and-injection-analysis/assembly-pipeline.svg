<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="violetG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="indigoG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="560" rx="14" fill="#f8fafc"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">System Prompt 组装流水线</text>
  <text x="410" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">从计算到最终发送，经历四个阶段</text>

  <!-- ============ Stage 1: 并行计算 ============ -->
  <g filter="url(#shadow)">
    <rect x="40" y="72" width="740" height="110" rx="10" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <rect x="40" y="72" width="740" height="28" rx="10" fill="url(#blueG)"/>
  <rect x="40" y="82" width="740" height="18" fill="url(#blueG)"/>
  <text x="62" y="92" font-size="13" font-weight="700" fill="white">阶段 1：并行计算（REPL.tsx）</text>
  <text x="730" y="92" font-size="10" fill="white" text-anchor="end">Promise.all</text>

  <rect x="62" y="110" width="220" height="56" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="172" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">getSystemPrompt()</text>
  <text x="172" y="150" text-anchor="middle" font-size="10" fill="#3b82f6">静态区 + 动态区 → string[]</text>

  <rect x="300" y="110" width="220" height="56" rx="8" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="410" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">getUserContext()</text>
  <text x="410" y="150" text-anchor="middle" font-size="10" fill="#10b981">CLAUDE.md + 当前日期</text>

  <rect x="538" y="110" width="220" height="56" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="648" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">getSystemContext()</text>
  <text x="648" y="150" text-anchor="middle" font-size="10" fill="#f59e0b">Git 状态 + Cache Breaker</text>

  <!-- Arrow down -->
  <path d="M 410 182 L 410 198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ Stage 2: 优先级决策 ============ -->
  <g filter="url(#shadow)">
    <rect x="40" y="205" width="740" height="130" rx="10" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <rect x="40" y="205" width="740" height="28" rx="10" fill="url(#violetG)"/>
  <rect x="40" y="215" width="740" height="18" fill="url(#violetG)"/>
  <text x="62" y="225" font-size="13" font-weight="700" fill="white">阶段 2：优先级决策（buildEffectiveSystemPrompt）</text>

  <!-- Priority chain -->
  <rect x="62" y="245" width="120" height="24" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="122" y="261" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">Override P0</text>

  <text x="192" y="261" font-size="11" fill="#94a3b8">&gt;</text>

  <rect x="204" y="245" width="120" height="24" rx="5" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="264" y="261" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Coordinator P1</text>

  <text x="334" y="261" font-size="11" fill="#94a3b8">&gt;</text>

  <rect x="346" y="245" width="100" height="24" rx="5" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="396" y="261" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">Agent P2</text>

  <text x="456" y="261" font-size="11" fill="#94a3b8">&gt;</text>

  <rect x="468" y="245" width="100" height="24" rx="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="518" y="261" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Custom P3</text>

  <text x="578" y="261" font-size="11" fill="#94a3b8">&gt;</text>

  <rect x="590" y="245" width="100" height="24" rx="5" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="640" y="261" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">Default P4</text>

  <!-- append prompt -->
  <rect x="62" y="282" width="695" height="22" rx="5" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="410" y="297" text-anchor="middle" font-size="10" fill="#64748b">+ Append System Prompt（--append-system-prompt）始终追加到最后</text>

  <!-- Note -->
  <text x="62" y="322" font-size="10" fill="#64748b">💡 高优先级者替换 default，Proactive 模式下 Agent Prompt 追加到 default 之后</text>

  <!-- Arrow down -->
  <path d="M 410 335 L 410 352" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ Stage 3: API层组装 ============ -->
  <g filter="url(#shadow)">
    <rect x="40" y="360" width="740" height="80" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="40" y="360" width="740" height="28" rx="10" fill="url(#amberG)"/>
  <rect x="40" y="370" width="740" height="18" fill="url(#amberG)"/>
  <text x="62" y="380" font-size="13" font-weight="700" fill="white">阶段 3：API 层包装（claude.ts）</text>

  <rect x="62" y="398" width="150" height="28" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="137" y="416" text-anchor="middle" font-size="10" fill="#991b1b">Attribution Header</text>
  <text x="137" y="430" text-anchor="middle" font-size="8" fill="#ef4444">scope: null</text>

  <text x="224" y="416" font-size="12" fill="#94a3b8">+</text>

  <rect x="240" y="398" width="140" height="28" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="310" y="416" text-anchor="middle" font-size="10" fill="#92400e">Identity Prefix</text>
  <text x="310" y="430" text-anchor="middle" font-size="8" fill="#d97706">scope: org</text>

  <text x="392" y="416" font-size="12" fill="#94a3b8">+</text>

  <rect x="408" y="398" width="160" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="488" y="416" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Core System Prompt</text>
  <text x="488" y="430" text-anchor="middle" font-size="8" fill="#2563eb">阶段2的输出</text>

  <text x="580" y="416" font-size="12" fill="#94a3b8">+</text>

  <rect x="596" y="398" width="160" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="676" y="416" text-anchor="middle" font-size="10" fill="#64748b">条件工具指令</text>
  <text x="676" y="430" text-anchor="middle" font-size="8" fill="#94a3b8">Advisor / Chrome</text>

  <!-- Arrow down -->
  <path d="M 410 440 L 410 458" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ Stage 4: 构建API Blocks ============ -->
  <g filter="url(#shadow)">
    <rect x="40" y="466" width="740" height="78" rx="10" fill="white" stroke="#6366f1" stroke-width="1.5"/>
  </g>
  <rect x="40" y="466" width="740" height="28" rx="10" fill="url(#indigoG)"/>
  <rect x="40" y="476" width="740" height="18" fill="url(#indigoG)"/>
  <text x="62" y="486" font-size="13" font-weight="700" fill="white">阶段 4：分割缓存 + 构建 Blocks</text>

  <rect x="62" y="504" width="220" height="26" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="172" y="521" text-anchor="middle" font-size="10" fill="#5b21b6">splitSysPromptPrefix()</text>

  <text x="296" y="521" font-size="11" fill="#64748b">按 BOUNDARY 分割</text>

  <rect x="430" y="504" width="230" height="26" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="545" y="521" text-anchor="middle" font-size="10" fill="#5b21b6">buildSystemPromptBlocks()</text>

  <text x="672" y="521" font-size="11" fill="#64748b">→ API 请求</text>
</svg>