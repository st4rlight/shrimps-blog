<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="indigoG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="14" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Prompt 注入时序</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">会话启动时一次性计算 → 每轮查询时动态组装</text>

  <!-- Phase 1: 会话启动 -->
  <g filter="url(#shadow)">
    <rect x="40" y="75" width="720" height="140" rx="10" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <rect x="40" y="75" width="720" height="34" rx="10" fill="url(#blueG)"/>
  <rect x="40" y="89" width="720" height="20" fill="url(#blueG)"/>
  <text x="62" y="98" font-size="14" font-weight="700" fill="white">会话启动（REPL.tsx）</text>
  <text x="730" y="98" font-size="11" fill="white" text-anchor="end">Promise.all 并行计算</text>

  <!-- Step 1 -->
  <rect x="65" y="122" width="200" height="38" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="165" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">1. getSystemPrompt()</text>
  <text x="165" y="153" text-anchor="middle" font-size="10" fill="#3b82f6">计算 system prompt 内容</text>

  <!-- Step 2 -->
  <rect x="290" y="122" width="200" height="38" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="390" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">2. getUserContext()</text>
  <text x="390" y="153" text-anchor="middle" font-size="10" fill="#3b82f6">加载 CLAUDE.md + 日期</text>

  <!-- Step 3 -->
  <rect x="515" y="122" width="220" height="38" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="625" y="139" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">3. getSystemContext()</text>
  <text x="625" y="153" text-anchor="middle" font-size="10" fill="#3b82f6">加载 Git 状态</text>

  <!-- Phase 2: 每轮查询 -->
  <g filter="url(#shadow)">
    <rect x="40" y="230" width="720" height="260" rx="10" fill="white" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="40" y="230" width="720" height="34" rx="10" fill="url(#greenG)"/>
  <rect x="40" y="244" width="720" height="20" fill="url(#greenG)"/>
  <text x="62" y="253" font-size="14" font-weight="700" fill="white">每轮查询（query.ts）</text>
  <text x="730" y="253" font-size="11" fill="white" text-anchor="end">顺序执行</text>

  <!-- Timeline line -->
  <line x1="120" y1="285" x2="120" y2="470" stroke="#d1d5db" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Step 4 -->
  <circle cx="120" cy="295" r="8" fill="#10b981"/>
  <text x="120" y="299" text-anchor="middle" font-size="9" font-weight="700" fill="white">4</text>
  <rect x="145" y="280" width="240" height="30" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="265" y="300" text-anchor="middle" font-size="11.5" font-weight="500" fill="#047857">appendSystemContext()</text>
  <text x="410" y="300" font-size="10" fill="#64748b">拼接 systemContext → systemPrompt</text>

  <!-- Step 5 -->
  <circle cx="120" cy="335" r="8" fill="#10b981"/>
  <text x="120" y="339" text-anchor="middle" font-size="9" font-weight="700" fill="white">5</text>
  <rect x="145" y="320" width="240" height="30" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="265" y="340" text-anchor="middle" font-size="11.5" font-weight="500" fill="#047857">prependUserContext()</text>
  <text x="410" y="340" font-size="10" fill="#64748b">注入 userContext → 首条消息</text>

  <!-- Step 6 -->
  <circle cx="120" cy="375" r="8" fill="#f59e0b"/>
  <text x="120" y="379" text-anchor="middle" font-size="9" font-weight="700" fill="white">6</text>
  <rect x="145" y="360" width="240" height="30" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="265" y="380" text-anchor="middle" font-size="11.5" font-weight="500" fill="#92400e">getAttachments()</text>
  <text x="410" y="380" font-size="10" fill="#64748b">计算 30+ 种动态附件</text>

  <!-- Step 7 -->
  <circle cx="120" cy="415" r="8" fill="#f59e0b"/>
  <text x="120" y="419" text-anchor="middle" font-size="9" font-weight="700" fill="white">7</text>
  <rect x="145" y="400" width="240" height="30" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="265" y="420" text-anchor="middle" font-size="11.5" font-weight="500" fill="#92400e">splitSysPromptPrefix()</text>
  <text x="410" y="420" font-size="10" fill="#64748b">分割静态/动态部分</text>

  <!-- Step 8 -->
  <circle cx="120" cy="450" r="8" fill="#6366f1"/>
  <text x="120" y="454" text-anchor="middle" font-size="9" font-weight="700" fill="white">8</text>
  <rect x="145" y="438" width="250" height="30" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="270" y="458" text-anchor="middle" font-size="11.5" font-weight="500" fill="#5b21b6">buildSystemPromptBlocks()</text>
  <text x="420" y="458" font-size="10" fill="#64748b">构建 API system blocks</text>

  <!-- Arrow from Phase 1 to Phase 2 -->
  <path d="M 400 215 L 400 225" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Final step callout -->
  <g filter="url(#shadow)">
    <rect x="540" y="430" width="200" height="48" rx="10" fill="white" stroke="#6366f1" stroke-width="2"/>
  </g>
  <circle cx="570" cy="454" r="12" fill="url(#indigoG)"/>
  <text x="570" y="459" text-anchor="middle" font-size="10" font-weight="700" fill="white">9</text>
  <text x="640" y="449" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">addCacheBreakpoints()</text>
  <text x="640" y="466" text-anchor="middle" font-size="10" fill="#64748b">+ cache_edits → 发送请求</text>

  <!-- Arrow from step 8 to step 9 -->
  <path d="M 395 453 L 530 454" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowB)" fill="none"/>

  <!-- Bottom tip -->
  <rect x="170" y="494" width="460" height="22" rx="11" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="400" y="509" text-anchor="middle" font-size="10.5" fill="#15803d">💡 步骤 1-3 并行计算，步骤 4-9 顺序执行，步骤 6 是最重的计算</text>
</svg>