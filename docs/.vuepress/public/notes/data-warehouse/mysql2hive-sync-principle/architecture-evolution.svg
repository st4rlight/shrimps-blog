<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="violetG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="420" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="410" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">架构演进趋势</text>
  <text x="410" y="55" text-anchor="middle" font-size="12" fill="#94a3b8">从传统全量同步 → CDC + Merge → 数据湖 + Flink CDC 一体化</text>

  <!-- Timeline arrow -->
  <line x1="60" y1="80" x2="770" y2="80" stroke="#e2e8f0" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="790" y="84" font-size="10" fill="#94a3b8">时效性</text>

  <!-- ===== Phase 1: 全量同步 ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="100" width="220" height="240" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="40" y="100" width="220" height="38" rx="12" fill="url(#blueG)"/>
  <rect x="40" y="118" width="220" height="20" fill="url(#blueG)"/>
  <text x="150" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="white">全量同步</text>

  <!-- Phase 1: tag -->
  <rect x="60" y="150" width="60" height="22" rx="11" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="90" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">T+1</text>
  <rect x="128" y="150" width="60" height="22" rx="11" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="158" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">天级</text>

  <!-- Phase 1: flow -->
  <g transform="translate(65, 185)">
    <rect width="55" height="28" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="27" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">MySQL</text>
  </g>
  <line x1="120" y1="199" x2="140" y2="199" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(145, 185)">
    <rect width="55" height="28" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="27" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Sqoop</text>
  </g>
  <line x1="200" y1="199" x2="220" y2="199" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(65, 225)">
    <rect width="190" height="28" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="95" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Hive (OVERWRITE)</text>
  </g>

  <!-- Phase 1: pros/cons -->
  <text x="60" y="278" font-size="10" fill="#475569">✓ 实现简单</text>
  <text x="60" y="294" font-size="10" fill="#475569">✓ 无需额外组件</text>
  <text x="60" y="314" font-size="10" fill="#ef4444">✗ 全表扫描，对源库影响大</text>
  <text x="60" y="330" font-size="10" fill="#ef4444">✗ 不支持 Update/Delete</text>

  <!-- Arrow 1→2 -->
  <path d="M 260 220 C 280 220, 280 220, 290 220" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ===== Phase 2: CDC + Merge ===== -->
  <g filter="url(#shadow)">
    <rect x="295" y="100" width="220" height="240" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="295" y="100" width="220" height="38" rx="12" fill="url(#greenG)"/>
  <rect x="295" y="118" width="220" height="20" fill="url(#greenG)"/>
  <text x="405" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="white">CDC + Merge</text>

  <!-- Phase 2: tag -->
  <rect x="315" y="150" width="60" height="22" rx="11" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="345" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">T+1</text>
  <rect x="383" y="150" width="75" height="22" rx="11" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="420" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">近实时采集</text>

  <!-- Phase 2: flow -->
  <g transform="translate(320, 185)">
    <rect width="40" height="28" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
    <text x="20" y="19" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">MySQL</text>
  </g>
  <line x1="360" y1="199" x2="375" y2="199" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(380, 185)">
    <rect width="40" height="28" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
    <text x="20" y="19" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">Canal</text>
  </g>
  <line x1="420" y1="199" x2="435" y2="199" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(440, 185)">
    <rect width="40" height="28" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
    <text x="20" y="19" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">Kafka</text>
  </g>
  <g transform="translate(320, 225)">
    <rect width="185" height="28" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
    <text x="92" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">Hive Binlog → Merge</text>
  </g>

  <!-- Phase 2: pros/cons -->
  <text x="315" y="278" font-size="10" fill="#475569">✓ 对源库无影响</text>
  <text x="315" y="294" font-size="10" fill="#475569">✓ 支持 Update/Delete</text>
  <text x="315" y="314" font-size="10" fill="#ef4444">✗ 实现复杂，链路长</text>
  <text x="315" y="330" font-size="10" fill="#ef4444">✗ Merge 需全表重写</text>

  <!-- Arrow 2→3 -->
  <path d="M 515 220 C 535 220, 535 220, 545 220" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowG)"/>

  <!-- ===== Phase 3: Flink CDC + 数据湖 ===== -->
  <g filter="url(#shadow)">
    <rect x="550" y="100" width="230" height="240" rx="12" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <rect x="550" y="100" width="230" height="38" rx="12" fill="url(#violetG)"/>
  <rect x="550" y="118" width="230" height="20" fill="url(#violetG)"/>
  <text x="665" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="white">Flink CDC + 数据湖</text>

  <!-- Phase 3: tag -->
  <rect x="570" y="150" width="60" height="22" rx="11" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="600" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">分钟级</text>
  <rect x="638" y="150" width="75" height="22" rx="11" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="675" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">近实时</text>

  <!-- Phase 3: flow -->
  <g transform="translate(575, 185)">
    <rect width="40" height="28" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
    <text x="20" y="19" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">MySQL</text>
  </g>
  <line x1="615" y1="199" x2="630" y2="199" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(635, 185)">
    <rect width="60" height="28" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
    <text x="30" y="19" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">Flink CDC</text>
  </g>
  <line x1="695" y1="199" x2="710" y2="199" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(715, 185)">
    <rect width="50" height="28" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
    <text x="25" y="19" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">Hudi</text>
  </g>
  <g transform="translate(575, 225)">
    <rect width="195" height="28" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
    <text x="97" y="19" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">全增量一体化 + 原生 Upsert</text>
  </g>

  <!-- Phase 3: pros/cons -->
  <text x="570" y="278" font-size="10" fill="#475569">✓ 全增量一体化，无需手动管理</text>
  <text x="570" y="294" font-size="10" fill="#475569">✓ 原生 Upsert，无需全表重写</text>
  <text x="570" y="314" font-size="10" fill="#475569">✓ 精确一次语义</text>
  <text x="570" y="330" font-size="10" fill="#f59e0b">△ 依赖 Flink 集群，运维成本高</text>

  <!-- Bottom: evolution summary -->
  <rect x="100" y="370" width="620" height="36" rx="18" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  
  <circle cx="140" cy="388" r="10" fill="url(#blueG)"/>
  <text x="140" y="392" text-anchor="middle" font-size="10" font-weight="700" fill="white">1</text>
  <text x="160" y="392" font-size="10" fill="#475569">简单可靠</text>

  <text x="260" y="392" font-size="14" fill="#94a3b8">→</text>

  <circle cx="310" cy="388" r="10" fill="url(#greenG)"/>
  <text x="310" y="392" text-anchor="middle" font-size="10" font-weight="700" fill="white">2</text>
  <text x="330" y="392" font-size="10" fill="#475569">精准高效</text>

  <text x="430" y="392" font-size="14" fill="#94a3b8">→</text>

  <circle cx="480" cy="388" r="10" fill="url(#violetG)"/>
  <text x="480" y="392" text-anchor="middle" font-size="10" font-weight="700" fill="white">3</text>
  <text x="500" y="392" font-size="10" fill="#475569">近实时 + 一体化</text>

  <text x="650" y="392" font-size="10" fill="#94a3b8">按需选择</text>
</svg>