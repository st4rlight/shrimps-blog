<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="readGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="writeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="optGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">读写锁机制对比</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#94a3b8">ReadWriteLock 读共享写独占 vs StampedLock 乐观读策略</text>

  <!-- ===== Left: ReadWriteLock ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="75" width="230" height="280" rx="12" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
  </g>
  <rect x="30" y="75" width="230" height="40" rx="12" fill="#475569"/>
  <rect x="30" y="95" width="230" height="20" fill="#475569"/>
  <text x="145" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="white">ReadWriteLock</text>

  <!-- Read Lock -->
  <text x="50" y="138" font-size="12" font-weight="600" fill="#3b82f6">读锁（共享）</text>
  <rect x="50" y="148" width="190" height="55" rx="8" fill="#dbeafe"/>
  
  <rect x="60" y="156" width="50" height="24" rx="5" fill="url(#readGrad)"/>
  <text x="85" y="173" text-anchor="middle" font-size="9" font-weight="600" fill="white">R1</text>
  
  <rect x="118" y="156" width="50" height="24" rx="5" fill="url(#readGrad)"/>
  <text x="143" y="173" text-anchor="middle" font-size="9" font-weight="600" fill="white">R2</text>
  
  <rect x="176" y="156" width="50" height="24" rx="5" fill="url(#readGrad)"/>
  <text x="201" y="173" text-anchor="middle" font-size="9" font-weight="600" fill="white">R3</text>

  <text x="145" y="195" text-anchor="middle" font-size="10" fill="#3b82f6">多个读线程可同时持有</text>

  <!-- Write Lock -->
  <text x="50" y="225" font-size="12" font-weight="600" fill="#ef4444">写锁（独占）</text>
  <rect x="50" y="235" width="190" height="45" rx="8" fill="#fee2e2"/>
  
  <rect x="60" y="243" width="50" height="24" rx="5" fill="url(#writeGrad)"/>
  <text x="85" y="260" text-anchor="middle" font-size="9" font-weight="600" fill="white">W1</text>
  
  <rect x="120" y="243" width="60" height="24" rx="5" fill="#fecaca" stroke="#fca5a5" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="150" y="260" text-anchor="middle" font-size="9" fill="#ef4444">W2 ✗</text>

  <text x="145" y="292" text-anchor="middle" font-size="10" fill="#ef4444">写锁独占，读写互斥</text>

  <!-- Note -->
  <rect x="45" y="310" width="200" height="35" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="145" y="327" text-anchor="middle" font-size="10" fill="#92400e">⚠ 写锁可降级为读锁</text>
  <text x="145" y="340" text-anchor="middle" font-size="10" fill="#92400e">读锁不可升级为写锁</text>

  <!-- ===== Center: StampedLock ===== -->
  <g filter="url(#shadow)">
    <rect x="285" y="75" width="230" height="280" rx="12" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
  </g>
  <rect x="285" y="75" width="230" height="40" rx="12" fill="#475569"/>
  <rect x="285" y="95" width="230" height="20" fill="#475569"/>
  <text x="400" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="white">StampedLock</text>

  <!-- Optimistic Read -->
  <text x="305" y="138" font-size="12" font-weight="600" fill="#10b981">乐观读（无锁）</text>
  <rect x="305" y="148" width="190" height="55" rx="8" fill="#d1fae5"/>
  
  <rect x="315" y="156" width="50" height="24" rx="5" fill="url(#optGrad)"/>
  <text x="340" y="173" text-anchor="middle" font-size="9" font-weight="600" fill="white">R1</text>
  
  <rect x="373" y="156" width="50" height="24" rx="5" fill="url(#optGrad)"/>
  <text x="398" y="173" text-anchor="middle" font-size="9" font-weight="600" fill="white">R2</text>

  <rect x="431" y="156" width="50" height="24" rx="5" fill="url(#optGrad)"/>
  <text x="456" y="173" text-anchor="middle" font-size="9" font-weight="600" fill="white">R3</text>

  <text x="400" y="195" text-anchor="middle" font-size="10" fill="#10b981">先读，再 validate 检查</text>

  <!-- Validate flow -->
  <rect x="305" y="210" width="90" height="25" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="350" y="227" text-anchor="middle" font-size="9" fill="#16a34a">validate ✅</text>
  
  <rect x="405" y="210" width="90" height="25" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="450" y="227" text-anchor="middle" font-size="9" fill="#ef4444">validate ❌</text>

  <text x="350" y="252" text-anchor="middle" font-size="9" fill="#64748b">直接使用</text>
  <text x="450" y="252" text-anchor="middle" font-size="9" fill="#64748b">升级为悲观读锁</text>

  <!-- Write Lock -->
  <text x="305" y="278" font-size="12" font-weight="600" fill="#ef4444">写锁（独占）</text>
  <rect x="305" y="288" width="190" height="30" rx="8" fill="#fee2e2"/>
  <rect x="315" y="293" width="50" height="20" rx="4" fill="url(#writeGrad)"/>
  <text x="340" y="307" text-anchor="middle" font-size="9" font-weight="600" fill="white">W1</text>
  <text x="400" y="307" text-anchor="middle" font-size="10" fill="#ef4444">独占写入</text>

  <!-- Note -->
  <rect x="300" y="330" width="200" height="20" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="400" y="344" text-anchor="middle" font-size="9" fill="#92400e">⚠ 不可重入，不支持 Condition</text>

  <!-- ===== Right: Comparison ===== -->
  <g filter="url(#shadow)">
    <rect x="540" y="75" width="230" height="280" rx="12" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
  </g>
  <rect x="540" y="75" width="230" height="40" rx="12" fill="#475569"/>
  <rect x="540" y="95" width="230" height="20" fill="#475569"/>
  <text x="655" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="white">性能对比</text>

  <!-- Read performance bar chart -->
  <text x="560" y="140" font-size="11" font-weight="600" fill="#475569">高并发读性能</text>
  
  <rect x="560" y="150" width="80" height="22" rx="4" fill="#dbeafe"/>
  <text x="600" y="165" text-anchor="middle" font-size="9" fill="#1d4ed8">RWLock</text>
  
  <rect x="655" y="150" width="95" height="22" rx="4" fill="#d1fae5"/>
  <text x="702" y="165" text-anchor="middle" font-size="9" fill="#047857">Stamped ⭐</text>

  <!-- Bar chart visual -->
  <rect x="560" y="185" width="60" height="14" rx="3" fill="#93c5fd"/>
  <rect x="655" y="185" width="95" height="14" rx="3" fill="#6ee7b7"/>
  <text x="595" y="196" text-anchor="middle" font-size="8" fill="#1e293b">★★★</text>
  <text x="702" y="196" text-anchor="middle" font-size="8" fill="#1e293b">★★★★★</text>

  <!-- Feature comparison table -->
  <line x1="560" y1="215" x2="750" y2="215" stroke="#e2e8f0" stroke-width="1"/>
  
  <text x="600" y="235" font-size="10" fill="#64748b">可重入</text>
  <text x="680" y="235" font-size="10" fill="#3b82f6">✅</text>
  <text x="720" y="235" font-size="10" fill="#ef4444">❌</text>
  
  <text x="600" y="255" font-size="10" fill="#64748b">Condition</text>
  <text x="680" y="255" font-size="10" fill="#3b82f6">✅</text>
  <text x="720" y="255" font-size="10" fill="#ef4444">❌</text>

  <text x="600" y="275" font-size="10" fill="#64748b">乐观读</text>
  <text x="680" y="275" font-size="10" fill="#ef4444">❌</text>
  <text x="720" y="275" font-size="10" fill="#10b981">✅</text>

  <text x="600" y="295" font-size="10" fill="#64748b">锁降级</text>
  <text x="680" y="295" font-size="10" fill="#3b82f6">✅</text>
  <text x="720" y="295" font-size="10" fill="#10b981">✅</text>

  <text x="600" y="315" font-size="10" fill="#64748b">复杂度</text>
  <text x="680" y="315" font-size="10" fill="#10b981">低</text>
  <text x="720" y="315" font-size="10" fill="#f59e0b">高</text>

  <!-- Bottom recommendation -->
  <rect x="555" y="330" width="200" height="20" rx="6" fill="#f1f5f9"/>
  <text x="655" y="344" text-anchor="middle" font-size="9" fill="#64748b">读多写少 → StampedLock 更优</text>
</svg>