<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 580" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="840" height="580" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="420" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">全量与增量的分界线</text>
  <text x="420" y="55" text-anchor="middle" font-size="12" fill="#94a3b8">从技术、业务、原则三个维度厘清全量与增量的边界</text>

  <!-- ===== Section 1: Technical Boundary ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="72" width="780" height="130" rx="10" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <rect x="30" y="72" width="780" height="30" rx="10" fill="url(#blueG)"/>
  <rect x="30" y="88" width="780" height="14" fill="url(#blueG)"/>
  <text x="50" y="93" font-size="13" font-weight="700" fill="white">📐 技术分界线：是否存在可靠的变更标识</text>

  <!-- Table headers -->
  <text x="55" y="123" font-size="10" font-weight="600" fill="#64748b">维度</text>
  <text x="200" y="123" font-size="10" font-weight="600" fill="#3b82f6">全量同步</text>
  <text x="420" y="123" font-size="10" font-weight="600" fill="#10b981">增量同步</text>
  <text x="640" y="123" font-size="10" font-weight="600" fill="#f59e0b">分界点</text>

  <line x1="45" y1="128" x2="800" y2="128" stroke="#e2e8f0" stroke-width="1"/>

  <text x="55" y="145" font-size="10" fill="#475569">变更标识</text>
  <text x="200" y="145" font-size="10" fill="#64748b">无 / 不信任</text>
  <text x="420" y="145" font-size="10" fill="#64748b">ID / update_time / Binlog 位点</text>
  <text x="640" y="145" font-size="10" fill="#64748b">能否唯一有序定位新数据</text>

  <text x="55" y="162" font-size="10" fill="#475569">写入模式</text>
  <text x="200" y="162" font-size="10" fill="#64748b">INSERT OVERWRITE（覆盖）</text>
  <text x="420" y="162" font-size="10" fill="#64748b">INSERT INTO / Upsert / Merge</text>
  <text x="640" y="162" font-size="10" fill="#64748b">是否允许覆盖历史</text>

  <text x="55" y="179" font-size="10" fill="#475569">幂等性</text>
  <text x="200" y="179" font-size="10" fill="#64748b">天然幂等</text>
  <text x="420" y="179" font-size="10" fill="#64748b">需保证顺序 + 断点续传</text>
  <text x="640" y="179" font-size="10" fill="#64748b">重试机制复杂度</text>

  <!-- ===== Section 2: Business Boundary ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="215" width="780" height="110" rx="10" fill="white" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="30" y="215" width="780" height="30" rx="10" fill="url(#greenG)"/>
  <rect x="30" y="231" width="780" height="14" fill="url(#greenG)"/>
  <text x="50" y="236" font-size="13" font-weight="700" fill="white">📊 业务分界线：量级、时效与变更特征</text>

  <!-- Three columns -->
  <rect x="50" y="255" width="230" height="55" rx="8" fill="#dbeafe" fill-opacity="0.4" stroke="#93c5fd" stroke-width="1"/>
  <text x="165" y="273" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">数据量级</text>
  <text x="165" y="290" text-anchor="middle" font-size="9" fill="#3b82f6">&lt; 500万 / &lt; 10GB → 全量</text>
  <text x="165" y="303" text-anchor="middle" font-size="9" fill="#10b981">&gt; 1000万 / &gt; 50GB → 增量</text>

  <rect x="300" y="255" width="230" height="55" rx="8" fill="#d1fae5" fill-opacity="0.4" stroke="#86efac" stroke-width="1"/>
  <text x="415" y="273" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">时效要求</text>
  <text x="415" y="290" text-anchor="middle" font-size="9" fill="#3b82f6">T+1 离线报表 → 全量</text>
  <text x="415" y="303" text-anchor="middle" font-size="9" fill="#10b981">准实时/小时级 → 增量</text>

  <rect x="550" y="255" width="240" height="55" rx="8" fill="#fef3c7" fill-opacity="0.4" stroke="#fbbf24" stroke-width="1"/>
  <text x="670" y="273" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">变更特征</text>
  <text x="670" y="290" text-anchor="middle" font-size="9" fill="#3b82f6">只增不改 → 自增ID增量</text>
  <text x="670" y="303" text-anchor="middle" font-size="9" fill="#10b981">频繁更新/删除 → CDC</text>

  <!-- ===== Section 3: Core Principle ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="340" width="780" height="145" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="30" y="340" width="780" height="30" rx="10" fill="url(#amberG)"/>
  <rect x="30" y="356" width="780" height="14" fill="url(#amberG)"/>
  <text x="50" y="361" font-size="13" font-weight="700" fill="white">⚡ 核心原则：重叠覆盖 &gt; 精确切分</text>

  <!-- Wrong approach -->
  <rect x="50" y="382" width="350" height="44" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="66" y="400" font-size="11" font-weight="600" fill="#dc2626">❌ 错误做法：精确切分</text>
  <text x="66" y="416" font-size="9" fill="#ef4444">全量到 23:59:59，增量从 00:00:00</text>
  <text x="310" y="416" font-size="9" fill="#ef4444">→ 时钟漂移丢数</text>

  <!-- Right approach -->
  <rect x="420" y="382" width="370" height="44" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="436" y="400" font-size="11" font-weight="600" fill="#15803d">✅ 正确做法：重叠覆盖</text>
  <text x="436" y="416" font-size="9" fill="#16a34a">全量快照点 T，增量回溯 T-N</text>
  <text x="660" y="416" font-size="9" fill="#16a34a">→ Merge 去重</text>

  <!-- Overlap visualization -->
  <rect x="50" y="436" width="740" height="36" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="75" y="443" width="240" height="12" rx="3" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="195" y="453" text-anchor="middle" font-size="8" font-weight="600" fill="#1d4ed8">全量快照</text>
  <rect x="260" y="457" width="300" height="12" rx="3" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="410" y="467" text-anchor="middle" font-size="8" font-weight="600" fill="#047857">增量 Binlog（回溯 N）</text>
  <rect x="260" y="443" width="55" height="26" rx="3" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5" fill-opacity="0.8"/>
  <text x="287" y="460" text-anchor="middle" font-size="8" font-weight="700" fill="#92400e">重叠区</text>
  <line x1="335" y1="450" x2="370" y2="450" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="375" y="454" font-size="9" fill="#64748b">Merge 去重消除重叠</text>

  <!-- ===== Bottom summary ===== -->
  <rect x="120" y="500" width="600" height="28" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="420" y="519" text-anchor="middle" font-size="11" fill="#15803d">💡 宁可多同步 1 小时的重复数据，也不要冒险少同步 1 秒</text>

  <!-- ===== MVCC insight box ===== -->
  <rect x="120" y="538" width="600" height="28" rx="14" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="420" y="557" text-anchor="middle" font-size="11" fill="#7c3aed">🔗 分界线 = 记录结束位点（P_end），而非起始位点 → 详见 §2.5</text>
</svg>
