<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="14" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">缓存策略：按变化频率分层</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#94a3b8">越稳定越靠前（缓存命中率越高），越易变越靠后（缓存失效代价越低）</text>

  <!-- ===== Layer 0: Buffer ===== -->
  <rect x="40" y="72" width="720" height="50" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="60" y="92" font-size="12" font-weight="700" fill="#991b1b">缓冲层</text>
  <text x="400" y="92" text-anchor="middle" font-size="10" fill="#991b1b">Attribution Header (含 fingerprint)</text>
  <text x="400" y="108" text-anchor="middle" font-size="9" fill="#ef4444">scope: null — 每次可能变化，隔离在前方</text>

  <rect x="40" y="128" width="720" height="50" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="60" y="148" font-size="12" font-weight="700" fill="#92400e">缓冲层</text>
  <text x="400" y="148" text-anchor="middle" font-size="10" fill="#92400e">Identity Prefix ("You are Claude Code...")</text>
  <text x="400" y="164" text-anchor="middle" font-size="9" fill="#d97706">scope: null — 虽然稳定，但作为缓冲确保后续 static 可用 global</text>

  <!-- ===== DYNAMIC BOUNDARY marker ===== -->
  <rect x="40" y="184" width="720" height="18" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="400" y="197" text-anchor="middle" font-size="9" font-weight="600" fill="#64748b">SYSTEM_PROMPT_DYNAMIC_BOUNDARY — 仅当 shouldUseGlobalCacheScope() = true 时插入</text>

  <!-- ===== Layer 1: Static ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="210" width="720" height="70" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="40" y="210" width="720" height="28" rx="10" fill="url(#blueG)"/>
  <rect x="40" y="222" width="720" height="16" fill="url(#blueG)"/>
  <text x="60" y="232" font-size="13" font-weight="700" fill="white">静态区（7 sections）</text>
  <text x="720" y="232" font-size="10" fill="white" text-anchor="end">几乎不变</text>

  <text x="60" y="256" font-size="10" fill="#374151">身份 · 行为规范 · 编码原则 · 行动审慎 · 工具使用 · 语气风格 · 输出效率</text>
  <rect x="600" y="248" width="145" height="22" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="672" y="263" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">scope: global ✅</text>

  <!-- ===== Layer 2: Dynamic ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="290" width="720" height="70" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="40" y="290" width="720" height="28" rx="10" fill="url(#amberG)"/>
  <rect x="40" y="302" width="720" height="16" fill="url(#amberG)"/>
  <text x="60" y="312" font-size="13" font-weight="700" fill="white">动态区（10~13 sections）</text>
  <text x="720" y="312" font-size="10" fill="white" text-anchor="end">会话内不变</text>

  <text x="60" y="336" font-size="10" fill="#374151">会话引导 · 记忆 · 环境信息 · 语言 · 输出风格 · MCP 指令 · ...</text>
  <rect x="610" y="328" width="135" height="22" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="677" y="343" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">scope: null</text>

  <!-- ===== Layer 3: System Context ===== -->
  <rect x="40" y="370" width="720" height="40" rx="8" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
  <text x="60" y="394" font-size="11" font-weight="600" fill="#9d174d">System Context（Git 状态）</text>
  <text x="720" y="394" font-size="9" fill="#9d174d" text-anchor="end">启动时快照，之后不变 · scope: null</text>

  <!-- ===== Divider ===== -->
  <line x1="40" y1="420" x2="760" y2="420" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="436" text-anchor="middle" font-size="10" fill="#94a3b8">↑ system prompt 缓存前缀  |  ↓ 消息流（独立缓存）</text>

  <!-- ===== Layer 4: User Context ===== -->
  <rect x="40" y="446" width="340" height="36" rx="8" fill="#d1fae5" stroke="#86efac" stroke-width="1.5"/>
  <text x="60" y="466" font-size="10" font-weight="600" fill="#047857">User Context（CLAUDE.md + 日期）</text>
  <text x="340" y="478" font-size="8" fill="#059669">用户可能修改 → 放消息流</text>

  <!-- ===== Layer 5: Attachments ===== -->
  <rect x="400" y="446" width="360" height="36" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="420" y="466" font-size="10" font-weight="600" fill="#5b21b6">Attachments（@文件 · 诊断 · TODO · delta）</text>
  <text x="720" y="478" font-size="8" fill="#7c3aed">每轮变化 → 放消息流</text>

  <!-- ===== Beta Header Latch tip ===== -->
  <rect x="100" y="492" width="600" height="22" rx="11" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="400" y="507" text-anchor="middle" font-size="9.5" fill="#92400e">💡 Beta Header 锁定：一旦发送就不移除，直到 /clear 或 /compact 重置 — "Header 锁定，行为动态"</text>
</svg>
