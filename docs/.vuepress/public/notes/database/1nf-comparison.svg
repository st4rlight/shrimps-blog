<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="340" rx="12" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="390" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">1NF：字段原子性 — 反例 vs 修正</text>

  <!-- === Left: Anti-pattern === -->
  <g filter="url(#shadow)">
    <rect x="30" y="60" width="340" height="260" rx="10" fill="white" stroke="#fca5a5" stroke-width="2"/>
  </g>
  <!-- Header -->
  <rect x="30" y="60" width="340" height="40" rx="10" fill="#fef2f2"/>
  <rect x="30" y="90" width="340" height="10" fill="#fef2f2"/>
  <text x="200" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#dc2626">❌ 违反 1NF</text>

  <!-- Table -->
  <!-- Header row -->
  <rect x="50" y="115" width="300" height="32" rx="4" fill="#fee2e2"/>
  <text x="110" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">学号</text>
  <text x="245" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">联系方式</text>

  <!-- Row 1 -->
  <line x1="50" y1="147" x2="350" y2="147" stroke="#fecaca" stroke-width="1"/>
  <text x="110" y="167" text-anchor="middle" font-size="12" fill="#374151">001</text>
  <text x="245" y="162" text-anchor="middle" font-size="11" fill="#374151">手机:138xxx</text>
  <text x="245" y="178" text-anchor="middle" font-size="11" fill="#374151">邮箱:a@b.com</text>

  <!-- Row 2 -->
  <line x1="50" y1="188" x2="350" y2="188" stroke="#fecaca" stroke-width="1"/>
  <text x="110" y="208" text-anchor="middle" font-size="12" fill="#374151">002</text>
  <text x="245" y="203" text-anchor="middle" font-size="11" fill="#374151">手机:139xxx</text>
  <text x="245" y="219" text-anchor="middle" font-size="11" fill="#374151">邮箱:c@d.com</text>

  <!-- Highlight -->
  <rect x="170" y="148" width="160" height="74" rx="3" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="250" y="240" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="600">↑ 非原子值！一个字段存了多个信息</text>

  <!-- === Arrow === -->
  <g transform="translate(390, 180)">
    <circle r="22" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="0" y="1" text-anchor="middle" font-size="18" fill="#64748b">→</text>
  </g>

  <!-- === Right: Correct === -->
  <g filter="url(#shadow)">
    <rect x="410" y="60" width="340" height="260" rx="10" fill="white" stroke="#86efac" stroke-width="2"/>
  </g>
  <!-- Header -->
  <rect x="410" y="60" width="340" height="40" rx="10" fill="#f0fdf4"/>
  <rect x="410" y="90" width="340" height="10" fill="#f0fdf4"/>
  <text x="580" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#16a34a">✅ 满足 1NF</text>

  <!-- Table -->
  <!-- Header row -->
  <rect x="430" y="115" width="300" height="32" rx="4" fill="#dcfce7"/>
  <text x="480" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">学号</text>
  <text x="580" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">手机号</text>
  <text x="680" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">邮箱</text>

  <!-- Row 1 -->
  <line x1="430" y1="147" x2="730" y2="147" stroke="#bbf7d0" stroke-width="1"/>
  <text x="480" y="167" text-anchor="middle" font-size="12" fill="#374151">001</text>
  <text x="580" y="167" text-anchor="middle" font-size="12" fill="#374151">138xxx</text>
  <text x="680" y="167" text-anchor="middle" font-size="12" fill="#374151">a@b.com</text>

  <!-- Row 2 -->
  <line x1="430" y1="177" x2="730" y2="177" stroke="#bbf7d0" stroke-width="1"/>
  <text x="480" y="197" text-anchor="middle" font-size="12" fill="#374151">002</text>
  <text x="580" y="197" text-anchor="middle" font-size="12" fill="#374151">139xxx</text>
  <text x="680" y="197" text-anchor="middle" font-size="12" fill="#374151">c@d.com</text>

  <!-- Highlight -->
  <rect x="530" y="148" width="190" height="52" rx="3" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="625" y="240" text-anchor="middle" font-size="10" fill="#22c55e" font-weight="600">↑ 每个字段都是单一原子值</text>
</svg>