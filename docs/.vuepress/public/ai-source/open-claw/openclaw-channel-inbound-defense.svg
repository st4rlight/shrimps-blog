<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">入站消息三层可靠性纵深防御</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#94a3b8">每层解决不同问题 — 去重防网络重传 / 防抖防用户连发 / 顺序队列防并发竞态</text>

  <!-- Incoming message -->
  <text x="400" y="72" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">入站消息流</text>
  <g>
    <rect x="80" y="78" width="70" height="20" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <text x="115" y="92" text-anchor="middle" font-size="8" fill="#991b1b">Msg A1</text>
  </g>
  <g>
    <rect x="160" y="78" width="70" height="20" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <text x="195" y="92" text-anchor="middle" font-size="8" fill="#991b1b">Msg A1'</text>
  </g>
  <g>
    <rect x="240" y="78" width="70" height="20" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <text x="275" y="92" text-anchor="middle" font-size="8" fill="#991b1b">Msg A2</text>
  </g>
  <g>
    <rect x="320" y="78" width="70" height="20" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <text x="355" y="92" text-anchor="middle" font-size="8" fill="#991b1b">Msg A3</text>
  </g>
  <g>
    <rect x="400" y="78" width="70" height="20" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="435" y="92" text-anchor="middle" font-size="8" fill="#1d4ed8">Msg B1</text>
  </g>
  <g>
    <rect x="480" y="78" width="70" height="20" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="515" y="92" text-anchor="middle" font-size="8" fill="#1d4ed8">Msg B2</text>
  </g>
  <g>
    <rect x="560" y="78" width="70" height="20" rx="4" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
    <text x="595" y="92" text-anchor="middle" font-size="8" fill="#047857">Msg C1</text>
  </g>

  <text x="650" y="92" font-size="8" fill="#94a3b8">A1'=重传  A=同用户  B=另一用户  C=另一群</text>

  <!-- Arrow down -->
  <line x1="400" y1="100" x2="400" y2="114" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 1: Dedup -->
  <g filter="url(#shadow)">
    <rect x="40" y="116" width="720" height="72" rx="10" fill="white" stroke="#ef4444" stroke-width="2"/>
  </g>
  <rect x="40" y="116" width="720" height="28" rx="10" fill="url(#redG)"/>
  <rect x="40" y="130" width="720" height="14" fill="url(#redG)"/>
  <text x="60" y="135" font-size="12" font-weight="700" fill="white">第 1 层：去重 — Processing Claims</text>
  <text x="740" y="135" text-anchor="end" font-size="10" fill="white">防网络重传</text>

  <text x="60" y="162" font-size="10" font-weight="600" fill="#1e293b">tryBeginFeishuMessageProcessing()</text>
  <text x="60" y="178" font-size="9" fill="#64748b">基于 claim 的互斥 — dedupe key 被"认领"后，后续相同 key 直接丢弃</text>
  <text x="460" y="178" font-size="9" fill="#64748b">区分"正在处理"和"已处理"两种状态</text>

  <!-- Result: A1' dropped -->
  <g>
    <rect x="600" y="152" width="70" height="20" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
    <text x="635" y="166" text-anchor="middle" font-size="8" fill="#991b1b">A1' 丢弃</text>
  </g>

  <!-- Arrow down -->
  <line x1="400" y1="188" x2="400" y2="202" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2: Debounce -->
  <g filter="url(#shadow)">
    <rect x="40" y="204" width="720" height="72" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <rect x="40" y="204" width="720" height="28" rx="10" fill="url(#amberG)"/>
  <rect x="40" y="218" width="720" height="14" fill="url(#amberG)"/>
  <text x="60" y="223" font-size="12" font-weight="700" fill="white">第 2 层：防抖 — Inbound Debouncer</text>
  <text x="740" y="223" text-anchor="end" font-size="10" fill="white">防用户连发</text>

  <text x="60" y="250" font-size="10" font-weight="600" fill="#1e293b">防抖键：feishu:{accountId}:{chatId}:{threadKey}:{senderId}</text>
  <text x="60" y="266" font-size="9" fill="#64748b">同用户同群的连续文本消息合并 → 保留最后消息结构 + 拼接所有文本 + mention 取并集</text>

  <!-- Result: A2+A3 merged -->
  <g>
    <rect x="580" y="240" width="160" height="20" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
    <text x="660" y="254" text-anchor="middle" font-size="8" fill="#92400e">A2+A3 合并为一条</text>
  </g>

  <!-- Arrow down -->
  <line x1="400" y1="276" x2="400" y2="290" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 3: Sequential Queue -->
  <g filter="url(#shadow)">
    <rect x="40" y="292" width="720" height="72" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="40" y="292" width="720" height="28" rx="10" fill="url(#blueG)"/>
  <rect x="40" y="306" width="720" height="14" fill="url(#blueG)"/>
  <text x="60" y="311" font-size="12" font-weight="700" fill="white">第 3 层：顺序队列 — Sequential Queue</text>
  <text x="740" y="311" text-anchor="end" font-size="10" fill="white">防并发竞态</text>

  <text x="60" y="338" font-size="10" font-weight="600" fill="#1e293b">以 chat ID 为 key，同一聊天中的消息严格串行处理</text>
  <text x="60" y="354" font-size="9" fill="#64748b">超时驱逐机制 — 执行超时自动移除，避免后续消息被永久阻塞</text>

  <!-- Result: ordered -->
  <g>
    <rect x="540" y="328" width="200" height="24" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="640" y="344" text-anchor="middle" font-size="8" fill="#1d4ed8">A1 → A2+A3 → B1 → B2</text>
  </g>

  <!-- Bottom tip -->
  <rect x="100" y="376" width="600" height="20" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="400" y="390" text-anchor="middle" font-size="10" fill="#15803d">💡 Channel 只做消息翻译 — 不拥有命令树、Provider 策略或特性菜单</text>
</svg>
