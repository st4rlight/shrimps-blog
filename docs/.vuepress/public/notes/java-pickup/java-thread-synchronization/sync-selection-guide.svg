<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="startG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="decisionG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="resultG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowN" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="820" height="560" rx="12" fill="#f8fafc"/>
  <text x="410" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">线程同步方案选型决策图</text>

  <!-- Start -->
  <g filter="url(#shadow)">
    <rect x="310" y="55" width="200" height="40" rx="20" fill="url(#startG)"/>
  </g>
  <text x="410" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="white">需要线程同步？</text>

  <!-- Decision 1 -->
  <line x1="410" y1="95" x2="410" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="280" y="118" width="260" height="40" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="410" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">只需保证可见性？</text>

  <!-- Yes → volatile -->
  <line x1="540" y1="138" x2="600" y2="138" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowY)"/>
  <text x="565" y="132" font-size="10" fill="#f59e0b" font-weight="600">是</text>
  <g filter="url(#shadow)">
    <rect x="605" y="120" width="170" height="36" rx="8" fill="url(#resultG)"/>
  </g>
  <text x="690" y="143" text-anchor="middle" font-size="13" font-weight="700" fill="white">volatile</text>

  <!-- No → Decision 2 -->
  <line x1="410" y1="158" x2="410" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowN)"/>
  <text x="420" y="173" font-size="10" fill="#64748b" font-weight="600">否</text>
  <g filter="url(#shadow)">
    <rect x="280" y="183" width="260" height="40" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="410" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">只需简单计数/引用更新？</text>

  <!-- Yes → Atomic -->
  <line x1="540" y1="203" x2="600" y2="203" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowY)"/>
  <text x="565" y="197" font-size="10" fill="#f59e0b" font-weight="600">是</text>
  <g filter="url(#shadow)">
    <rect x="605" y="185" width="170" height="36" rx="8" fill="url(#resultG)"/>
  </g>
  <text x="690" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="white">Atomic 类</text>

  <!-- No → Decision 3 -->
  <line x1="410" y1="223" x2="410" y2="245" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowN)"/>
  <text x="420" y="238" font-size="10" fill="#64748b" font-weight="600">否</text>
  <g filter="url(#shadow)">
    <rect x="280" y="248" width="260" height="40" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="410" y="273" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">需要线程协调/等待？</text>

  <!-- Yes → Decision 3a -->
  <line x1="540" y1="268" x2="600" y2="268" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowY)"/>
  <text x="565" y="262" font-size="10" fill="#f59e0b" font-weight="600">是</text>
  
  <g filter="url(#shadow)">
    <rect x="605" y="248" width="170" height="40" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="690" y="273" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">一次性 or 可重用？</text>

  <!-- one-time → CountDownLatch -->
  <line x1="775" y1="258" x2="790" y2="230" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowY)"/>
  <text x="795" y="224" font-size="9" fill="#f59e0b" font-weight="500">一次性</text>
  <g filter="url(#shadow)">
    <rect x="605" y="195" width="0" height="0" rx="8" fill="url(#resultG)"/>
  </g>

  <!-- Sub-decisions for coordination -->
  <rect x="605" y="300" width="80" height="28" rx="6" fill="url(#resultG)" filter="url(#shadow)"/>
  <text x="645" y="319" text-anchor="middle" font-size="10" font-weight="700" fill="white">Latch</text>
  <text x="645" y="340" text-anchor="middle" font-size="8" fill="#64748b">一次性等待</text>
  <line x1="645" y1="288" x2="645" y2="300" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="632" y="296" font-size="8" fill="#f59e0b">一次性</text>

  <rect x="695" y="300" width="80" height="28" rx="6" fill="url(#resultG)" filter="url(#shadow)"/>
  <text x="735" y="319" text-anchor="middle" font-size="10" font-weight="700" fill="white">Barrier</text>
  <text x="735" y="340" text-anchor="middle" font-size="8" fill="#64748b">循环同步</text>
  <line x1="710" y1="288" x2="735" y2="300" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="730" y="296" font-size="8" fill="#f59e0b">可重用</text>

  <rect x="605" y="355" width="170" height="28" rx="6" fill="url(#resultG)" filter="url(#shadow)"/>
  <text x="690" y="374" text-anchor="middle" font-size="10" font-weight="700" fill="white">Semaphore</text>
  <text x="690" y="395" text-anchor="middle" font-size="8" fill="#64748b">限流控制</text>
  <line x1="690" y1="340" x2="690" y2="355" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="665" y="350" font-size="8" fill="#f59e0b">限流/资源池</text>

  <!-- No → Decision 4 -->
  <line x1="410" y1="288" x2="410" y2="310" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowN)"/>
  <text x="420" y="303" font-size="10" fill="#64748b" font-weight="600">否</text>
  <g filter="url(#shadow)">
    <rect x="280" y="313" width="260" height="40" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="410" y="338" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">读多写少场景？</text>

  <!-- Yes → ReadWriteLock / StampedLock -->
  <line x1="540" y1="333" x2="600" y2="333" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowY)"/>
  <text x="565" y="327" font-size="10" fill="#f59e0b" font-weight="600">是</text>
  <rect x="60" y="325" width="120" height="28" rx="6" fill="url(#resultG)" filter="url(#shadow)"/>
  <text x="120" y="344" text-anchor="middle" font-size="10" font-weight="700" fill="white">ReadWriteLock</text>
  <rect x="190" y="325" width="120" height="28" rx="6" fill="url(#resultG)" filter="url(#shadow)"/>
  <text x="250" y="344" text-anchor="middle" font-size="10" font-weight="700" fill="white">StampedLock</text>
  <line x1="310" y1="333" x2="280" y2="339" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="280" y="327" font-size="8" fill="#64748b">简单</text>
  <text x="310" y="356" font-size="8" fill="#64748b">极致性能</text>

  <!-- No → Decision 5 -->
  <line x1="410" y1="353" x2="410" y2="375" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowN)"/>
  <text x="420" y="368" font-size="10" fill="#64748b" font-weight="600">否</text>
  <g filter="url(#shadow)">
    <rect x="280" y="378" width="260" height="40" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="410" y="403" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">需要高级特性（超时/公平/多条件）？</text>

  <!-- Yes → ReentrantLock -->
  <line x1="540" y1="398" x2="600" y2="398" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowY)"/>
  <text x="565" y="392" font-size="10" fill="#f59e0b" font-weight="600">是</text>
  <g filter="url(#shadow)">
    <rect x="605" y="380" width="170" height="36" rx="8" fill="url(#resultG)"/>
  </g>
  <text x="690" y="403" text-anchor="middle" font-size="13" font-weight="700" fill="white">ReentrantLock</text>

  <!-- No → synchronized -->
  <line x1="410" y1="418" x2="410" y2="440" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowN)"/>
  <text x="420" y="434" font-size="10" fill="#64748b" font-weight="600">否</text>
  <g filter="url(#shadow)">
    <rect x="320" y="443" width="180" height="40" rx="8" fill="url(#resultG)"/>
  </g>
  <text x="410" y="468" text-anchor="middle" font-size="14" font-weight="700" fill="white">synchronized</text>

  <!-- Bottom principle -->
  <rect x="150" y="505" width="520" height="40" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="410" y="522" text-anchor="middle" font-size="12" fill="#15803d" font-weight="600">核心原则：能简单就简单，优先 synchronized</text>
  <text x="410" y="538" text-anchor="middle" font-size="10" fill="#64748b">只有确实需要高级特性时，才考虑更复杂的同步方案</text>
</svg>