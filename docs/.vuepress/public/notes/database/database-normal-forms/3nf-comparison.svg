<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">3NF：消除传递函数依赖 — 反例 vs 修正</text>

  <!-- === Left: Anti-pattern === -->
  <g filter="url(#shadow)">
    <rect x="20" y="55" width="320" height="330" rx="10" fill="white" stroke="#fca5a5" stroke-width="2"/>
  </g>
  <rect x="20" y="55" width="320" height="36" rx="10" fill="#fef2f2"/>
  <rect x="20" y="81" width="320" height="10" fill="#fef2f2"/>
  <text x="180" y="79" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">❌ 违反 3NF：员工表</text>

  <!-- Table header -->
  <rect x="35" y="100" width="290" height="28" rx="4" fill="#fee2e2"/>
  <text x="80" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">工号🔑</text>
  <text x="165" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">部门号</text>
  <text x="265" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">部门名称</text>

  <!-- Rows -->
  <line x1="35" y1="128" x2="325" y2="128" stroke="#fecaca" stroke-width="1"/>
  <text x="80" y="148" text-anchor="middle" font-size="11" fill="#374151">E001</text>
  <text x="165" y="148" text-anchor="middle" font-size="11" fill="#374151">D01</text>
  <text x="265" y="148" text-anchor="middle" font-size="11" fill="#374151">技术部</text>

  <line x1="35" y1="158" x2="325" y2="158" stroke="#fecaca" stroke-width="1"/>
  <text x="80" y="178" text-anchor="middle" font-size="11" fill="#374151">E002</text>
  <text x="165" y="178" text-anchor="middle" font-size="11" fill="#374151">D01</text>
  <text x="265" y="178" text-anchor="middle" font-size="11" fill="#374151">技术部</text>

  <line x1="35" y1="188" x2="325" y2="188" stroke="#fecaca" stroke-width="1"/>
  <text x="80" y="208" text-anchor="middle" font-size="11" fill="#374151">E003</text>
  <text x="165" y="208" text-anchor="middle" font-size="11" fill="#374151">D02</text>
  <text x="265" y="208" text-anchor="middle" font-size="11" fill="#374151">市场部</text>

  <!-- Highlight redundancy -->
  <rect x="215" y="129" width="95" height="82" rx="3" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Dependency diagram -->
  <rect x="40" y="250" width="280" height="120" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="180" y="272" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">传递依赖分析</text>

  <!-- Chain: 工号 → 部门号 → 部门名称 -->
  <rect x="60" y="285" width="55" height="24" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="87" y="301" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">工号</text>
  
  <line x1="115" y1="297" x2="140" y2="297" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <rect x="145" y="285" width="60" height="24" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="175" y="301" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">部门号</text>

  <line x1="205" y1="297" x2="230" y2="297" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <rect x="235" y="285" width="70" height="24" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="270" y="301" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">部门名称</text>

  <text x="180" y="345" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="600">⚠ 工号 传递决定了 部门名称</text>
  <text x="180" y="362" text-anchor="middle" font-size="10" fill="#ef4444">部门名称不直接依赖工号，而是通过部门号传递</text>

  <!-- === Arrow === -->
  <g transform="translate(370, 205)">
    <circle r="22" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="0" y="1" text-anchor="middle" font-size="18" fill="#64748b">→</text>
  </g>

  <!-- === Right: Correct === -->
  <g filter="url(#shadow)">
    <rect x="420" y="55" width="360" height="330" rx="10" fill="white" stroke="#86efac" stroke-width="2"/>
  </g>
  <rect x="420" y="55" width="360" height="36" rx="10" fill="#f0fdf4"/>
  <rect x="420" y="81" width="360" height="10" fill="#f0fdf4"/>
  <text x="600" y="79" text-anchor="middle" font-size="13" font-weight="600" fill="#16a34a">✅ 满足 3NF：拆分为两张表</text>

  <!-- Table 1: Employee -->
  <rect x="435" y="100" width="155" height="28" rx="4" fill="#dcfce7"/>
  <text x="480" y="119" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">工号🔑</text>
  <text x="550" y="119" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">部门号</text>

  <line x1="435" y1="128" x2="590" y2="128" stroke="#bbf7d0" stroke-width="1"/>
  <text x="480" y="148" text-anchor="middle" font-size="10" fill="#374151">E001</text>
  <text x="550" y="148" text-anchor="middle" font-size="10" fill="#374151">D01</text>

  <line x1="435" y1="158" x2="590" y2="158" stroke="#bbf7d0" stroke-width="1"/>
  <text x="480" y="178" text-anchor="middle" font-size="10" fill="#374151">E002</text>
  <text x="550" y="178" text-anchor="middle" font-size="10" fill="#374151">D01</text>

  <line x1="435" y1="188" x2="590" y2="188" stroke="#bbf7d0" stroke-width="1"/>
  <text x="480" y="208" text-anchor="middle" font-size="10" fill="#374151">E003</text>
  <text x="550" y="208" text-anchor="middle" font-size="10" fill="#374151">D02</text>

  <text x="512" y="230" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">员工表</text>

  <!-- Table 2: Department -->
  <rect x="625" y="100" width="140" height="28" rx="4" fill="#dbeafe"/>
  <text x="670" y="119" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">部门号🔑</text>
  <text x="740" y="119" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">部门名称</text>

  <line x1="625" y1="128" x2="765" y2="128" stroke="#bfdbfe" stroke-width="1"/>
  <text x="670" y="148" text-anchor="middle" font-size="10" fill="#374151">D01</text>
  <text x="740" y="148" text-anchor="middle" font-size="10" fill="#374151">技术部</text>

  <line x1="625" y1="158" x2="765" y2="158" stroke="#bfdbfe" stroke-width="1"/>
  <text x="670" y="178" text-anchor="middle" font-size="10" fill="#374151">D02</text>
  <text x="740" y="178" text-anchor="middle" font-size="10" fill="#374151">市场部</text>

  <text x="695" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">部门表</text>

  <!-- Connection line -->
  <line x1="590" y1="165" x2="625" y2="148" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow3)"/>

  <!-- Bottom note -->
  <rect x="440" y="250" width="320" height="120" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="600" y="272" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">修正效果</text>
  <text x="600" y="296" text-anchor="middle" font-size="10" fill="#374151">✓ 部门名称不再随员工记录重复存储</text>
  <text x="600" y="316" text-anchor="middle" font-size="10" fill="#374151">✓ 修改部门名称只需更新部门表一行</text>
  <text x="600" y="336" text-anchor="middle" font-size="10" fill="#374151">✓ 消除了传递函数依赖</text>
  <text x="600" y="356" text-anchor="middle" font-size="10" fill="#374151">✓ 避免了更新异常（技术部名称不一致）</text>
</svg>