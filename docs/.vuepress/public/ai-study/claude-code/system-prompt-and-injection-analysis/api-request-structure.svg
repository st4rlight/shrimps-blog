<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="violetG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="indigoG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="560" rx="14" fill="#f8fafc"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">API 请求的最终结构</text>
  <text x="410" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">五层注入架构最终合并为一次 API 请求</text>

  <!-- ============ system blocks ============ -->
  <g filter="url(#shadow)">
    <rect x="40" y="72" width="740" height="135" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="40" y="72" width="740" height="28" rx="10" fill="url(#blueG)"/>
  <rect x="40" y="82" width="740" height="18" fill="url(#blueG)"/>
  <text x="62" y="92" font-size="13" font-weight="700" fill="white">system: TextBlockParam[]</text>
  <text x="730" y="92" font-size="10" fill="white" text-anchor="end">L1 + L3</text>

  <!-- billing header -->
  <rect x="58" y="110" width="200" height="22" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="158" y="125" text-anchor="middle" font-size="9.5" fill="#991b1b">x-anthropic-billing-header</text>
  <text x="158" y="140" text-anchor="middle" font-size="8" fill="#ef4444">scope: null</text>

  <!-- identity prefix -->
  <rect x="268" y="110" width="200" height="22" rx="5" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="368" y="125" text-anchor="middle" font-size="9.5" fill="#92400e">You are Claude Code...</text>
  <text x="368" y="140" text-anchor="middle" font-size="8" fill="#d97706">scope: null</text>

  <!-- static -->
  <rect x="478" y="110" width="135" height="22" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="545" y="125" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1d4ed8">[static sections]</text>
  <text x="545" y="140" text-anchor="middle" font-size="8" font-weight="700" fill="#2563eb">scope: global</text>

  <!-- dynamic -->
  <rect x="623" y="110" width="140" height="22" rx="5" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
  <text x="693" y="125" text-anchor="middle" font-size="9.5" fill="#9d174d">[dynamic sections]</text>
  <text x="693" y="140" text-anchor="middle" font-size="8" fill="#db2777">scope: null</text>

  <!-- Cache scope legend -->
  <text x="58" y="175" font-size="9" fill="#64748b">缓存作用域：</text>
  <rect x="130" y="165" width="50" height="14" rx="3" fill="#3b82f6" opacity="0.2"/>
  <text x="155" y="175" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">global</text>
  <rect x="190" y="165" width="40" height="14" rx="3" fill="#f59e0b" opacity="0.2"/>
  <text x="210" y="175" text-anchor="middle" font-size="8" font-weight="600" fill="#d97706">org</text>
  <rect x="240" y="165" width="40" height="14" rx="3" fill="#ef4444" opacity="0.2"/>
  <text x="260" y="175" text-anchor="middle" font-size="8" font-weight="600" fill="#ef4444">null</text>
  <text x="290" y="175" font-size="9" fill="#64748b">= 不缓存</text>

  <!-- ============ tools ============ -->
  <g filter="url(#shadow)">
    <rect x="40" y="220" width="740" height="90" rx="10" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <rect x="40" y="220" width="740" height="28" rx="10" fill="url(#violetG)"/>
  <rect x="40" y="230" width="740" height="18" fill="url(#violetG)"/>
  <text x="62" y="240" font-size="13" font-weight="700" fill="white">tools: ToolParam[]</text>
  <text x="730" y="240" font-size="10" fill="white" text-anchor="end">L5</text>

  <!-- Built-in tools row -->
  <rect x="58" y="260" width="65" height="20" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="90" y="274" text-anchor="middle" font-size="9" fill="#5b21b6">Agent</text>
  <rect x="130" y="260" width="55" height="20" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="157" y="274" text-anchor="middle" font-size="9" fill="#5b21b6">Bash</text>
  <rect x="192" y="260" width="55" height="20" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="219" y="274" text-anchor="middle" font-size="9" fill="#5b21b6">Read</text>
  <rect x="254" y="260" width="55" height="20" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="281" y="274" text-anchor="middle" font-size="9" fill="#5b21b6">Edit</text>
  <rect x="316" y="260" width="60" height="20" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="346" y="274" text-anchor="middle" font-size="9" fill="#5b21b6">Write</text>
  <rect x="383" y="260" width="55" height="20" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="410" y="274" text-anchor="middle" font-size="9" fill="#5b21b6">Glob</text>
  <rect x="445" y="260" width="55" height="20" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="472" y="274" text-anchor="middle" font-size="9" fill="#5b21b6">Grep</text>
  <text x="530" y="274" font-size="10" fill="#94a3b8">...</text>

  <!-- last built-in with cache -->
  <rect x="555" y="260" width="100" height="20" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="605" y="274" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">WebSearch</text>
  <text x="605" y="294" text-anchor="middle" font-size="8" font-weight="600" fill="#7c3aed">scope: global</text>

  <!-- MCP tools -->
  <rect x="680" y="260" width="85" height="20" rx="4" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="722" y="274" text-anchor="middle" font-size="9" fill="#7c3aed">mcp__*</text>
  <text x="722" y="294" text-anchor="middle" font-size="8" fill="#a855f7">追加在后</text>

  <!-- ============ messages ============ -->
  <g filter="url(#shadow)">
    <rect x="40" y="325" width="740" height="175" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="40" y="325" width="740" height="28" rx="10" fill="url(#greenG)"/>
  <rect x="40" y="335" width="740" height="18" fill="url(#greenG)"/>
  <text x="62" y="345" font-size="13" font-weight="700" fill="white">messages: MessageParam[]</text>
  <text x="730" y="345" font-size="10" fill="white" text-anchor="end">L2 + L4 + 用户</text>

  <!-- User Context message -->
  <rect x="58" y="365" width="230" height="42" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="68" y="381" font-size="9.5" font-weight="600" fill="#047857">user: prependUserContext</text>
  <text x="68" y="399" font-size="9" fill="#059669">&lt;system-reminder&gt;CLAUDE.md + 日期&lt;/system-reminder&gt;</text>
  <text x="268" y="381" font-size="8" fill="#64748b">← L2</text>

  <!-- Original user message -->
  <rect x="58" y="416" width="230" height="32" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="68" y="436" font-size="9.5" font-weight="500" fill="#047857">user: 原始用户消息</text>

  <!-- Attachment messages -->
  <rect x="310" y="365" width="230" height="42" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="320" y="381" font-size="9.5" font-weight="600" fill="#92400e">user: AttachmentMessage</text>
  <text x="320" y="399" font-size="9" fill="#b45309">@文件内容、Skill、Plan、TODO...</text>
  <text x="520" y="381" font-size="8" fill="#64748b">← L4</text>

  <rect x="310" y="416" width="230" height="32" rx="6" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="320" y="436" font-size="9.5" font-weight="500" fill="#92400e">user: AttachmentMessage (更多...)</text>

  <!-- Assistant message -->
  <rect x="560" y="365" width="200" height="32" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="570" y="385" font-size="9.5" font-weight="500" fill="#475569">assistant: 模型回复</text>

  <rect x="560" y="406" width="200" height="32" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="570" y="426" font-size="9.5" font-weight="500" fill="#475569">user: 下一轮用户输入</text>

  <!-- More messages indicator -->
  <text x="660" y="460" font-size="10" fill="#94a3b8">...</text>

  <!-- ============ cache_edits & context_management ============ -->
  <g filter="url(#shadow)">
    <rect x="40" y="470" width="355" height="42" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="40" y="470" width="355" height="24" rx="8" fill="url(#amberG)"/>
  <rect x="40" y="478" width="355" height="16" fill="url(#amberG)"/>
  <text x="62" y="486" font-size="11" font-weight="700" fill="white">cache_edits: [...]</text>
  <text x="62" y="504" font-size="9.5" fill="#64748b">Cached MC 删除指令</text>

  <g filter="url(#shadow)">
    <rect x="425" y="470" width="355" height="42" rx="8" fill="white" stroke="#6366f1" stroke-width="1.5"/>
  </g>
  <rect x="425" y="470" width="355" height="24" rx="8" fill="url(#indigoG)"/>
  <rect x="425" y="478" width="355" height="16" fill="url(#indigoG)"/>
  <text x="447" y="486" font-size="11" font-weight="700" fill="white">context_management: {...}</text>
  <text x="447" y="504" font-size="9.5" fill="#64748b">API 上下文管理策略</text>

  <!-- Bottom tip -->
  <rect x="150" y="528" width="520" height="24" rx="12" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="410" y="544" text-anchor="middle" font-size="10.5" fill="#1d4ed8">💡 system 的 static 部分 + tools 末尾标记 global 缓存，跨用户复用</text>
</svg>