<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="340" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">全量同步流程</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#94a3b8">每次同步时，将 MySQL 源表所有数据完整抽取并覆盖写入 Hive</text>

  <!-- Step 1: MySQL -->
  <g filter="url(#shadow)">
    <rect x="40" y="90" width="150" height="110" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="40" y="90" width="150" height="38" rx="12" fill="url(#blueG)"/>
  <rect x="40" y="108" width="150" height="20" fill="url(#blueG)"/>
  <text x="115" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="white">MySQL</text>
  <text x="115" y="150" text-anchor="middle" font-size="11" fill="#475569">SELECT * FROM</text>
  <text x="115" y="168" text-anchor="middle" font-size="11" fill="#475569">order_info</text>
  <text x="115" y="186" text-anchor="middle" font-size="10" fill="#94a3b8">全表扫描</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="145" x2="240" y2="145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="215" y="138" text-anchor="middle" font-size="9" fill="#94a3b8">抽取</text>

  <!-- Step 2: Sqoop/DataX -->
  <g filter="url(#shadow)">
    <rect x="245" y="90" width="150" height="110" rx="12" fill="white" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <rect x="245" y="90" width="150" height="38" rx="12" fill="url(#amberG)"/>
  <rect x="245" y="108" width="150" height="20" fill="url(#amberG)"/>
  <text x="320" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="white">Sqoop / DataX</text>
  <text x="320" y="150" text-anchor="middle" font-size="11" fill="#475569">数据传输中间件</text>
  <text x="320" y="168" text-anchor="middle" font-size="11" fill="#475569">JDBC 批量读取</text>
  <text x="320" y="186" text-anchor="middle" font-size="10" fill="#94a3b8">并行抽取</text>

  <!-- Arrow 2 -->
  <line x1="395" y1="145" x2="445" y2="145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="138" text-anchor="middle" font-size="9" fill="#94a3b8">写入</text>

  <!-- Step 3: HDFS -->
  <g filter="url(#shadow)">
    <rect x="450" y="90" width="150" height="110" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="450" y="90" width="150" height="38" rx="12" fill="url(#greenG)"/>
  <rect x="450" y="108" width="150" height="20" fill="url(#greenG)"/>
  <text x="525" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="white">HDFS 临时目录</text>
  <text x="525" y="150" text-anchor="middle" font-size="11" fill="#475569">/tmp/sqoop/</text>
  <text x="525" y="168" text-anchor="middle" font-size="11" fill="#475569">order_info/dt=T</text>
  <text x="525" y="186" text-anchor="middle" font-size="10" fill="#94a3b8">中间存储</text>

  <!-- Arrow 3 -->
  <line x1="600" y1="145" x2="650" y2="145" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="625" y="138" text-anchor="middle" font-size="9" fill="#94a3b8">LOAD</text>

  <!-- Step 4: Hive -->
  <g filter="url(#shadow)">
    <rect x="655" y="90" width="110" height="110" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="655" y="90" width="110" height="38" rx="12" fill="url(#blueG)"/>
  <rect x="655" y="108" width="110" height="20" fill="url(#blueG)"/>
  <text x="710" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="white">Hive</text>
  <text x="710" y="150" text-anchor="middle" font-size="11" fill="#475569">ods 表</text>
  <text x="710" y="168" text-anchor="middle" font-size="11" fill="#475569">OVERWRITE</text>
  <text x="710" y="186" text-anchor="middle" font-size="10" fill="#94a3b8">分区覆盖</text>

  <!-- Pain Points -->
  <rect x="40" y="230" width="720" height="90" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="400" y="252" text-anchor="middle" font-size="13" font-weight="600" fill="#991b1b">⚠ 全量同步的痛点</text>
  
  <g transform="translate(70, 265)">
    <circle cx="8" cy="8" r="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="8" y="12" text-anchor="middle" font-size="10" font-weight="700" fill="#ef4444">1</text>
    <text x="24" y="12" font-size="11" fill="#475569">性能瓶颈：全表扫描耗时随数据量线性增长</text>
  </g>
  <g transform="translate(70, 285)">
    <circle cx="8" cy="8" r="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="8" y="12" text-anchor="middle" font-size="10" font-weight="700" fill="#ef4444">2</text>
    <text x="24" y="12" font-size="11" fill="#475569">对 MySQL 影响大：大量 SELECT 造成慢查询</text>
  </g>
  <g transform="translate(400, 265)">
    <circle cx="8" cy="8" r="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="8" y="12" text-anchor="middle" font-size="10" font-weight="700" fill="#ef4444">3</text>
    <text x="24" y="12" font-size="11" fill="#475569">无法处理 Update/Delete</text>
  </g>
  <g transform="translate(400, 285)">
    <circle cx="8" cy="8" r="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="8" y="12" text-anchor="middle" font-size="10" font-weight="700" fill="#ef4444">4</text>
    <text x="24" y="12" font-size="11" fill="#475569">存储浪费：每天一份全量快照</text>
  </g>
</svg>