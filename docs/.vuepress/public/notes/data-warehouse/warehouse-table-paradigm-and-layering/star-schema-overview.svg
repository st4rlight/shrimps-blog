<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="factG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dimG1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dimG2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dimG3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dimG4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">星型模型（Star Schema）</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">事实表居中，维度表直接关联，结构扁平无规范化</text>

  <!-- ===== Connection Lines (behind cards) ===== -->
  <!-- Top dim (时间) → Fact -->
  <line x1="400" y1="168" x2="400" y2="218" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- Left dim (商品) → Fact -->
  <line x1="238" y1="280" x2="300" y2="280" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- Right dim (用户) → Fact -->
  <line x1="562" y1="280" x2="500" y2="280" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- Bottom dim (地区) → Fact -->
  <line x1="400" y1="388" x2="400" y2="342" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== Fact Table (Center) ===== -->
  <g filter="url(#shadow)">
    <rect x="300" y="220" width="200" height="120" rx="12" fill="white" stroke="#2563eb" stroke-width="2.5"/>
  </g>
  <rect x="300" y="220" width="200" height="40" rx="12" fill="url(#factG)"/>
  <rect x="300" y="244" width="200" height="16" fill="url(#factG)"/>
  <text x="400" y="247" text-anchor="middle" font-size="15" font-weight="700" fill="white">订单事实表</text>
  <text x="318" y="278" font-size="10" fill="#64748b">order_id</text>
  <text x="318" y="294" font-size="10" fill="#64748b">user_id (FK)</text>
  <text x="318" y="310" font-size="10" fill="#64748b">sku_id (FK)</text>
  <text x="318" y="326" font-size="10" fill="#64748b">date_id (FK)</text>
  <text x="430" y="278" font-size="10" fill="#64748b">region_id (FK)</text>
  <text x="430" y="294" font-size="10" fill="#1d4ed8" font-weight="600">pay_amt</text>
  <text x="430" y="310" font-size="10" fill="#1d4ed8" font-weight="600">item_cnt</text>
  <text x="430" y="326" font-size="10" fill="#1d4ed8" font-weight="600">discount_amt</text>

  <!-- ===== Top Dimension: 时间维度 ===== -->
  <g filter="url(#shadow)">
    <rect x="310" y="84" width="180" height="84" rx="10" fill="white" stroke="#059669" stroke-width="2"/>
  </g>
  <rect x="310" y="84" width="180" height="32" rx="10" fill="url(#dimG1)"/>
  <rect x="310" y="104" width="180" height="12" fill="url(#dimG1)"/>
  <text x="400" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="white">时间维度</text>
  <text x="325" y="130" font-size="9" fill="#64748b">date_id (PK)</text>
  <text x="325" y="144" font-size="9" fill="#64748b">year · quarter · month · day</text>
  <text x="325" y="158" font-size="9" fill="#64748b">weekday · is_holiday</text>

  <!-- ===== Left Dimension: 商品维度 ===== -->
  <g filter="url(#shadow)">
    <rect x="58" y="228" width="180" height="104" rx="10" fill="white" stroke="#9333ea" stroke-width="2"/>
  </g>
  <rect x="58" y="228" width="180" height="32" rx="10" fill="url(#dimG2)"/>
  <rect x="58" y="248" width="180" height="12" fill="url(#dimG2)"/>
  <text x="148" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="white">商品维度</text>
  <text x="73" y="274" font-size="9" fill="#64748b">sku_id (PK)</text>
  <text x="73" y="288" font-size="9" fill="#64748b">sku_name · brand</text>
  <text x="73" y="302" font-size="9" fill="#64748b">category · sub_category</text>
  <text x="73" y="316" font-size="9" fill="#64748b">price · color · size</text>

  <!-- ===== Right Dimension: 用户维度 ===== -->
  <g filter="url(#shadow)">
    <rect x="562" y="228" width="180" height="104" rx="10" fill="white" stroke="#d97706" stroke-width="2"/>
  </g>
  <rect x="562" y="228" width="180" height="32" rx="10" fill="url(#dimG3)"/>
  <rect x="562" y="248" width="180" height="12" fill="url(#dimG3)"/>
  <text x="652" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="white">用户维度</text>
  <text x="577" y="274" font-size="9" fill="#64748b">user_id (PK)</text>
  <text x="577" y="288" font-size="9" fill="#64748b">user_name · gender · age</text>
  <text x="577" y="302" font-size="9" fill="#64748b">province · city · district</text>
  <text x="577" y="316" font-size="9" fill="#64748b">vip_level · register_date</text>

  <!-- ===== Bottom Dimension: 地区维度 ===== -->
  <g filter="url(#shadow)">
    <rect x="310" y="390" width="180" height="84" rx="10" fill="white" stroke="#ef4444" stroke-width="2"/>
  </g>
  <rect x="310" y="390" width="180" height="32" rx="10" fill="url(#dimG4)"/>
  <rect x="310" y="410" width="180" height="12" fill="url(#dimG4)"/>
  <text x="400" y="412" text-anchor="middle" font-size="13" font-weight="700" fill="white">地区维度</text>
  <text x="325" y="436" font-size="9" fill="#64748b">region_id (PK)</text>
  <text x="325" y="450" font-size="9" fill="#64748b">province · city · district</text>
  <text x="325" y="464" font-size="9" fill="#64748b">country · timezone</text>

  <!-- ===== Bottom Tip ===== -->
  <rect x="180" y="484" width="440" height="0" rx="0" fill="none"/>
</svg>