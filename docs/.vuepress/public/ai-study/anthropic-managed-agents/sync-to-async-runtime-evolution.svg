<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="violetG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowLg" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="480" rx="14" fill="#f8fafc"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">从同步到异步：Agent Runtime 演进</text>
  <text x="410" y="48" text-anchor="middle" font-size="11" fill="#94a3b8">从"同步请求处理器"演进为"可持续推进的异步执行体"</text>

  <!-- ===== LEFT: Synchronous Model ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="65" width="350" height="290" rx="10" fill="white" stroke="#ef4444" stroke-width="1.5"/>
  </g>
  <rect x="30" y="65" width="350" height="34" rx="10" fill="url(#redG)"/>
  <rect x="30" y="85" width="350" height="14" fill="url(#redG)"/>
  <text x="205" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="white">❌ 同步模型（当前）</text>

  <!-- Sync flow steps -->
  <rect x="60" y="115" width="290" height="30" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="205" y="135" text-anchor="middle" font-size="11" font-weight="500" fill="#991b1b">用户请求</text>

  <line x1="205" y1="145" x2="205" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="158" width="290" height="30" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="205" y="178" text-anchor="middle" font-size="11" font-weight="500" fill="#991b1b">LLM 推理（阻塞等待）</text>

  <line x1="205" y1="188" x2="205" y2="198" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="201" width="290" height="30" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="205" y="221" text-anchor="middle" font-size="11" font-weight="500" fill="#991b1b">同步调用工具（阻塞等待返回）</text>

  <line x1="205" y1="231" x2="205" y2="241" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="244" width="290" height="30" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="205" y="264" text-anchor="middle" font-size="11" font-weight="500" fill="#991b1b">再次推理（阻塞等待）</text>

  <line x1="205" y1="274" x2="205" y2="284" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="60" y="287" width="290" height="30" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="205" y="307" text-anchor="middle" font-size="11" font-weight="500" fill="#991b1b">返回结果</text>

  <!-- Blocking indicator -->
  <rect x="60" y="330" width="290" height="18" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="205" y="343" text-anchor="middle" font-size="9" font-weight="500" fill="#92400e">⚠ 整条链路阻塞，一步卡住全部卡住</text>

  <!-- ===== VS Circle ===== -->
  <circle cx="410" cy="210" r="22" fill="url(#amberG)" filter="url(#shadow)"/>
  <text x="410" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="white">VS</text>

  <!-- ===== Evolution Arrow ===== -->
  <path d="M 395 240 Q 410 290 410 330" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arrowAmber)"/>

  <!-- ===== RIGHT: Async Model ===== -->
  <g filter="url(#shadowLg)">
    <rect x="440" y="65" width="350" height="290" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="440" y="65" width="350" height="34" rx="10" fill="url(#greenG)"/>
  <rect x="440" y="85" width="350" height="14" fill="url(#greenG)"/>
  <text x="615" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="white">✅ 异步模型（演进方向）</text>

  <!-- Async flow: Event Log (center) -->
  <rect x="520" y="115" width="190" height="28" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="615" y="134" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">📜 Session Event Log</text>

  <!-- Harness worker consumes -->
  <line x1="615" y1="143" x2="615" y2="153" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <rect x="470" y="156" width="290" height="28" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="615" y="175" text-anchor="middle" font-size="11" font-weight="500" fill="#047857">Harness Worker 消费事件 → 生成命令</text>

  <!-- Three async branches -->
  <line x1="530" y1="184" x2="510" y2="198" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="615" y1="184" x2="615" y2="198" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="700" y1="184" x2="720" y2="198" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- Tool Activity -->
  <rect x="460" y="201" width="100" height="40" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="510" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">Tool</text>
  <text x="510" y="232" text-anchor="middle" font-size="9" fill="#64748b">异步执行</text>

  <!-- LLM Activity -->
  <rect x="565" y="201" width="100" height="40" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="615" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">LLM推理</text>
  <text x="615" y="232" text-anchor="middle" font-size="9" fill="#64748b">异步Activity</text>

  <!-- Human Activity -->
  <rect x="670" y="201" width="100" height="40" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="720" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">Human</text>
  <text x="720" y="232" text-anchor="middle" font-size="9" fill="#64748b">注入事件</text>

  <!-- Results flow back to event log -->
  <path d="M 510 241 Q 510 260 560 268" stroke="#8b5cf6" stroke-width="1" fill="none" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <path d="M 615 241 L 615 268" stroke="#8b5cf6" stroke-width="1" fill="none" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <path d="M 720 241 Q 720 260 670 268" stroke="#8b5cf6" stroke-width="1" fill="none" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <!-- Event write-back -->
  <rect x="470" y="270" width="290" height="28" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="615" y="289" text-anchor="middle" font-size="11" font-weight="500" fill="#1d4ed8">结果作为新事件写回 Session Log</text>

  <!-- Any worker continues -->
  <line x1="615" y1="298" x2="615" y2="308" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <rect x="470" y="311" width="290" height="28" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="615" y="330" text-anchor="middle" font-size="11" font-weight="500" fill="#047857">任意 Worker 继续推进同一个 Session</text>

  <!-- Non-blocking indicator -->
  <rect x="470" y="348" width="290" height="18" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="0.5"/>
  <text x="615" y="361" text-anchor="middle" font-size="9" font-weight="500" fill="#15803d">✓ 一步不卡住，Worker可随时切换，pause/resume/cancel 天然支持</text>

  <!-- ===== Bottom: Key Changes ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="375" width="760" height="95" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="30" y="375" width="760" height="30" rx="10" fill="url(#amberG)"/>
  <rect x="30" y="393" width="760" height="12" fill="url(#amberG)"/>
  <text x="410" y="396" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">异步 Runtime 的本质性变化</text>

  <!-- 4 key changes -->
  <rect x="50" y="415" width="170" height="44" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="135" y="432" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">生命周期解耦</text>
  <text x="135" y="448" text-anchor="middle" font-size="9" fill="#475569">Agent ≠ 单次请求</text>

  <rect x="235" y="415" width="170" height="44" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="0.5"/>
  <text x="320" y="432" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">Tool 异步化</text>
  <text x="320" y="448" text-anchor="middle" font-size="9" fill="#475569">工具 ≠ 同步函数</text>

  <rect x="420" y="415" width="170" height="44" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="505" y="432" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">推理 Activity 化</text>
  <text x="505" y="448" text-anchor="middle" font-size="9" fill="#475569">LLM ≠ 必须阻塞</text>

  <rect x="605" y="415" width="170" height="44" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="0.5"/>
  <text x="690" y="432" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">可中断一等能力</text>
  <text x="690" y="448" text-anchor="middle" font-size="9" fill="#475569">pause/resume 天然</text>
</svg>