<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="440" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Gateway 四层认证纵深防御</text>
  <text x="400" y="50" text-anchor="middle" font-size="11" fill="#94a3b8">任何一层都不能省 — 缺一层 = 缺一类攻击面防护</text>

  <!-- Layer 1: Gateway Auth -->
  <g filter="url(#shadow)">
    <rect x="60" y="68" width="680" height="72" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="60" y="68" width="680" height="28" rx="10" fill="url(#blueG)"/>
  <rect x="60" y="82" width="680" height="14" fill="url(#blueG)"/>
  <text x="80" y="87" font-size="13" font-weight="700" fill="white">第 1 层：Gateway 认证</text>
  <text x="710" y="87" text-anchor="end" font-size="10" fill="white">谁在连我？</text>

  <!-- Auth modes -->
  <rect x="75" y="104" width="90" height="26" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="120" y="121" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">token 令牌</text>

  <rect x="175" y="104" width="100" height="26" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="225" y="121" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">password 密码</text>

  <rect x="285" y="104" width="110" height="26" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="340" y="121" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">tailscale 身份</text>

  <rect x="405" y="104" width="120" height="26" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="465" y="121" text-anchor="middle" font-size="9" font-weight="600" fill="#1d4ed8">trusted-proxy 代理</text>

  <rect x="535" y="104" width="90" height="26" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="580" y="121" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">none 不推荐</text>

  <!-- Arrow 1→2 -->
  <line x1="400" y1="140" x2="400" y2="152" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="149" font-size="8" fill="#94a3b8">通过</text>

  <!-- Layer 2: Device Pairing -->
  <g filter="url(#shadow)">
    <rect x="60" y="154" width="680" height="72" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="60" y="154" width="680" height="28" rx="10" fill="url(#greenG)"/>
  <rect x="60" y="168" width="680" height="14" fill="url(#greenG)"/>
  <text x="80" y="173" font-size="13" font-weight="700" fill="white">第 2 层：设备配对</text>
  <text x="710" y="173" text-anchor="end" font-size="10" fill="white">你是什么设备？</text>

  <!-- Pairing details -->
  <rect x="75" y="190" width="130" height="26" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="140" y="207" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">challenge 签名</text>

  <rect x="215" y="190" width="150" height="26" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="290" y="207" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">platform + deviceFamily 绑定</text>

  <rect x="375" y="190" width="130" height="26" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="440" y="207" text-anchor="middle" font-size="9" font-weight="600" fill="#047857">元数据变更 → 重配对</text>

  <rect x="515" y="190" width="120" height="26" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="575" y="207" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">loopback 自动审批</text>

  <!-- Arrow 2→3 -->
  <line x1="400" y1="226" x2="400" y2="238" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="235" font-size="8" fill="#94a3b8">配对</text>

  <!-- Layer 3: Rate Limiting -->
  <g filter="url(#shadow)">
    <rect x="60" y="240" width="680" height="72" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <rect x="60" y="240" width="680" height="28" rx="10" fill="url(#amberG)"/>
  <rect x="60" y="254" width="680" height="14" fill="url(#amberG)"/>
  <text x="80" y="259" font-size="13" font-weight="700" fill="white">第 3 层：速率限制</text>
  <text x="710" y="259" text-anchor="end" font-size="10" fill="white">你请求太频繁了吗？</text>

  <!-- Rate limiters -->
  <g filter="url(#shadow)">
    <rect x="75" y="278" width="290" height="26" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  </g>
  <text x="220" y="295" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">常规限制器 — loopback 可豁免</text>

  <g filter="url(#shadow)">
    <rect x="385" y="278" width="290" height="26" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  </g>
  <text x="530" y="295" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">浏览器限制器 — loopback 不豁免（防 XSS）</text>

  <!-- Arrow 3→4 -->
  <line x1="400" y1="312" x2="400" y2="324" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="321" font-size="8" fill="#94a3b8">限内</text>

  <!-- Layer 4: Session Generation -->
  <g filter="url(#shadow)">
    <rect x="60" y="326" width="680" height="72" rx="10" fill="white" stroke="#ef4444" stroke-width="2"/>
  </g>
  <rect x="60" y="326" width="680" height="28" rx="10" fill="url(#redG)"/>
  <rect x="60" y="340" width="680" height="14" fill="url(#redG)"/>
  <text x="80" y="345" font-size="13" font-weight="700" fill="white">第 4 层：共享会话代（Session Generation）</text>
  <text x="710" y="345" text-anchor="end" font-size="10" fill="white">认证变了吗？</text>

  <rect x="75" y="364" width="310" height="26" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="230" y="381" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">认证信息变更 → 强制所有客户端重连</text>

  <rect x="400" y="364" width="310" height="26" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="555" y="381" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">旧令牌失效 → 必须重新认证获取新令牌</text>

  <!-- Attack blocked indicators (right side) -->
  <text x="755" y="100" font-size="18" fill="#ef4444">🛡️</text>
  <text x="755" y="186" font-size="18" fill="#ef4444">🛡️</text>
  <text x="755" y="272" font-size="18" fill="#ef4444">🛡️</text>
  <text x="755" y="358" font-size="18" fill="#ef4444">🛡️</text>

  <!-- Bottom tip -->
  <rect x="100" y="410" width="600" height="24" rx="12" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="400" y="426" text-anchor="middle" font-size="10" fill="#991b1b">⚠️ 只做 Gateway 认证不做配对 = 任何拿到 token 的人都能伪装成新设备</text>
</svg>
