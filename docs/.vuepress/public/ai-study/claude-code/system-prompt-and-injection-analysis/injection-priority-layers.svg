<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="redG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="violetG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="480" rx="14" fill="#f8fafc"/>

  <!-- Title -->
  <text x="410" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">各注入源的优先级与覆盖关系</text>
  <text x="410" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">从覆盖层到工具层，五层按优先级依次叠加</text>

  <!-- Layer 1: Override -->
  <g filter="url(#shadow)">
    <rect x="40" y="72" width="740" height="78" rx="10" fill="white" stroke="#ef4444" stroke-width="2"/>
  </g>
  <rect x="40" y="72" width="740" height="30" rx="10" fill="url(#redG)"/>
  <rect x="40" y="82" width="740" height="20" fill="url(#redG)"/>
  <text x="62" y="92" font-size="13" font-weight="700" fill="white">覆盖（Override）层</text>
  <text x="730" y="92" font-size="10" fill="white" text-anchor="end">优先级最高</text>

  <text x="62" y="118" font-size="11" fill="#475569" font-weight="500">overrideSystemPrompt &gt; coordinatorPrompt &gt; agentPrompt &gt; customSystemPrompt &gt; defaultPrompt</text>
  <text x="62" y="138" font-size="10" fill="#64748b">+ appendSystemPrompt 始终追加到最后</text>

  <!-- Arrow between layers -->
  <text x="410" y="163" text-anchor="middle" font-size="12" fill="#94a3b8">↓</text>

  <!-- Layer 2: Merge -->
  <g filter="url(#shadow)">
    <rect x="40" y="170" width="740" height="60" rx="10" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <rect x="40" y="170" width="740" height="28" rx="10" fill="url(#blueG)"/>
  <rect x="40" y="180" width="740" height="18" fill="url(#blueG)"/>
  <text x="62" y="190" font-size="13" font-weight="700" fill="white">合并（Merge）层</text>

  <text x="62" y="214" font-size="11" fill="#475569">systemPrompt + systemContext → fullSystemPrompt</text>

  <!-- Arrow -->
  <text x="410" y="243" text-anchor="middle" font-size="12" fill="#94a3b8">↓</text>

  <!-- Layer 3: Prepend -->
  <g filter="url(#shadow)">
    <rect x="40" y="250" width="740" height="60" rx="10" fill="white" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="40" y="250" width="740" height="28" rx="10" fill="url(#greenG)"/>
  <rect x="40" y="260" width="740" height="18" fill="url(#greenG)"/>
  <text x="62" y="270" font-size="13" font-weight="700" fill="white">前置（Prepend）层</text>

  <text x="62" y="294" font-size="11" fill="#475569">userContext → 首条 user message（CLAUDE.md + 当前日期）</text>

  <!-- Arrow -->
  <text x="410" y="323" text-anchor="middle" font-size="12" fill="#94a3b8">↓</text>

  <!-- Layer 4: Attachment -->
  <g filter="url(#shadow)">
    <rect x="40" y="330" width="740" height="60" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="40" y="330" width="740" height="28" rx="10" fill="url(#amberG)"/>
  <rect x="40" y="340" width="740" height="18" fill="url(#amberG)"/>
  <text x="62" y="350" font-size="13" font-weight="700" fill="white">附件（Attachment）层</text>

  <text x="62" y="374" font-size="11" fill="#475569">30+ 种附件 → AttachmentMessages，与用户消息交替插入</text>

  <!-- Arrow -->
  <text x="410" y="403" text-anchor="middle" font-size="12" fill="#94a3b8">↓</text>

  <!-- Layer 5: Tools -->
  <g filter="url(#shadow)">
    <rect x="40" y="410" width="740" height="60" rx="10" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <rect x="40" y="410" width="740" height="28" rx="10" fill="url(#violetG)"/>
  <rect x="40" y="420" width="740" height="18" fill="url(#violetG)"/>
  <text x="62" y="430" font-size="13" font-weight="700" fill="white">工具（Tools）层</text>

  <text x="62" y="454" font-size="11" fill="#475569">builtInTools + mcpTools → assembleToolPool | deferred tools → delta attachments</text>
</svg>