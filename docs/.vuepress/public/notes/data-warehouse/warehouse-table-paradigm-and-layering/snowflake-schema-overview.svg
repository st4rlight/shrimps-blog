<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="factG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dimG1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dimG2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dimG3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dimG4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="subDimG1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e9d5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8b4fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="subDimG2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">雪花模型（Snowflake Schema）</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">维度表进一步规范化拆分，消除冗余但 JOIN 层级增加</text>

  <!-- ===== Connection Lines (behind cards) ===== -->
  <!-- Top dim (时间) → Fact -->
  <line x1="400" y1="164" x2="400" y2="218" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- Left dim (商品) → Fact -->
  <line x1="238" y1="280" x2="300" y2="280" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- Right dim (用户) → Fact -->
  <line x1="562" y1="280" x2="500" y2="280" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <!-- Bottom dim (地区) → Fact -->
  <line x1="400" y1="388" x2="400" y2="342" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Sub-dim lines: 品类 → 商品 -->
  <line x1="88" y1="190" x2="128" y2="228" stroke="#d8b4fe" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <!-- Sub-dim lines: 省份 → 地区 -->
  <line x1="670" y1="430" x2="490" y2="430" stroke="#fde68a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ===== Fact Table (Center) ===== -->
  <g filter="url(#shadow)">
    <rect x="300" y="220" width="200" height="120" rx="12" fill="white" stroke="#2563eb" stroke-width="2.5"/>
  </g>
  <rect x="300" y="220" width="200" height="40" rx="12" fill="url(#factG)"/>
  <rect x="300" y="244" width="200" height="16" fill="url(#factG)"/>
  <text x="400" y="247" text-anchor="middle" font-size="15" font-weight="700" fill="white">订单事实表</text>
  <text x="318" y="278" font-size="10" fill="#64748b">order_id</text>
  <text x="318" y="294" font-size="10" fill="#64748b">user_id (FK)</text>
  <text x="318" y="310" font-size="10" fill="#64748b">sku_id (FK)</text>
  <text x="318" y="326" font-size="10" fill="#64748b">date_id (FK)</text>
  <text x="430" y="278" font-size="10" fill="#64748b">region_id (FK)</text>
  <text x="430" y="294" font-size="10" fill="#1d4ed8" font-weight="600">pay_amt</text>
  <text x="430" y="310" font-size="10" fill="#1d4ed8" font-weight="600">item_cnt</text>
  <text x="430" y="326" font-size="10" fill="#1d4ed8" font-weight="600">discount_amt</text>

  <!-- ===== Top Dimension: 时间维度 (no further normalization) ===== -->
  <g filter="url(#shadow)">
    <rect x="310" y="80" width="180" height="84" rx="10" fill="white" stroke="#059669" stroke-width="2"/>
  </g>
  <rect x="310" y="80" width="180" height="32" rx="10" fill="url(#dimG1)"/>
  <rect x="310" y="100" width="180" height="12" fill="url(#dimG1)"/>
  <text x="400" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="white">时间维度</text>
  <text x="325" y="126" font-size="9" fill="#64748b">date_id (PK)</text>
  <text x="325" y="140" font-size="9" fill="#64748b">year · quarter · month · day</text>
  <text x="325" y="154" font-size="9" fill="#64748b">weekday · is_holiday</text>

  <!-- ===== Left Dimension: 商品维度 (normalized) ===== -->
  <g filter="url(#shadow)">
    <rect x="58" y="228" width="180" height="104" rx="10" fill="white" stroke="#9333ea" stroke-width="2"/>
  </g>
  <rect x="58" y="228" width="180" height="32" rx="10" fill="url(#dimG2)"/>
  <rect x="58" y="248" width="180" height="12" fill="url(#dimG2)"/>
  <text x="148" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="white">商品维度</text>
  <text x="73" y="274" font-size="9" fill="#64748b">sku_id (PK)</text>
  <text x="73" y="288" font-size="9" fill="#64748b">sku_name · brand</text>
  <text x="73" y="302" font-size="9" fill="#64748b">price · color · size</text>
  <text x="73" y="316" font-size="9" fill="#7c3aed" font-weight="500">category_id (FK) →</text>

  <!-- Sub-dimension: 品类维度 -->
  <g filter="url(#shadow)">
    <rect x="18" y="90" width="150" height="98" rx="8" fill="white" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,2"/>
  </g>
  <rect x="18" y="90" width="150" height="28" rx="8" fill="url(#subDimG1)"/>
  <rect x="18" y="108" width="150" height="10" fill="url(#subDimG1)"/>
  <text x="93" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">品类维度</text>
  <text x="30" y="132" font-size="9" fill="#64748b">category_id (PK)</text>
  <text x="30" y="146" font-size="9" fill="#64748b">category_name</text>
  <text x="30" y="160" font-size="9" fill="#64748b">sub_category · level</text>
  <text x="30" y="174" font-size="9" fill="#64748b">parent_category_id</text>

  <!-- ===== Right Dimension: 用户维度 (normalized) ===== -->
  <g filter="url(#shadow)">
    <rect x="562" y="228" width="180" height="104" rx="10" fill="white" stroke="#d97706" stroke-width="2"/>
  </g>
  <rect x="562" y="228" width="180" height="32" rx="10" fill="url(#dimG3)"/>
  <rect x="562" y="248" width="180" height="12" fill="url(#dimG3)"/>
  <text x="652" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="white">用户维度</text>
  <text x="577" y="274" font-size="9" fill="#64748b">user_id (PK)</text>
  <text x="577" y="288" font-size="9" fill="#64748b">user_name · gender · age</text>
  <text x="577" y="302" font-size="9" fill="#64748b">vip_level · register_date</text>
  <text x="577" y="316" font-size="9" fill="#b45309" font-weight="500">region_id (FK) →</text>

  <!-- ===== Bottom Dimension: 地区维度 (normalized) ===== -->
  <g filter="url(#shadow)">
    <rect x="310" y="390" width="180" height="84" rx="10" fill="white" stroke="#ef4444" stroke-width="2"/>
  </g>
  <rect x="310" y="390" width="180" height="32" rx="10" fill="url(#dimG4)"/>
  <rect x="310" y="410" width="180" height="12" fill="url(#dimG4)"/>
  <text x="400" y="412" text-anchor="middle" font-size="13" font-weight="700" fill="white">地区维度</text>
  <text x="325" y="436" font-size="9" fill="#64748b">region_id (PK)</text>
  <text x="325" y="450" font-size="9" fill="#64748b">city_name · district</text>
  <text x="325" y="464" font-size="9" fill="#dc2626" font-weight="500">province_id (FK) →</text>

  <!-- Sub-dimension: 省份维度 -->
  <g filter="url(#shadow)">
    <rect x="670" y="386" width="112" height="84" rx="8" fill="white" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  </g>
  <rect x="670" y="386" width="112" height="28" rx="8" fill="url(#subDimG2)"/>
  <rect x="670" y="404" width="112" height="10" fill="url(#subDimG2)"/>
  <text x="726" y="406" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">省份维度</text>
  <text x="682" y="428" font-size="9" fill="#64748b">province_id (PK)</text>
  <text x="682" y="442" font-size="9" fill="#64748b">province_name</text>
  <text x="682" y="456" font-size="9" fill="#64748b">country · timezone</text>

  <!-- ===== Annotation: multi-level JOIN ===== -->
  <rect x="558" y="82" width="200" height="40" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="658" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">⚠️ 多级 JOIN</text>
  <text x="658" y="114" font-size="9" fill="#991b1b">查询需关联子维度表，性能下降</text>

  <!-- ===== Annotation: redundant eliminated ===== -->
  <rect x="558" y="130" width="200" height="40" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="1"/>
  <text x="658" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">✅ 冗余消除</text>
  <text x="658" y="162" font-size="9" fill="#047857">每条数据只存一份，一致性好</text>

  <!-- Dashed lines from sub-dims annotation -->
  <line x1="558" y1="102" x2="168" y2="145" stroke="#fca5a5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="558" y1="150" x2="490" y2="420" stroke="#86efac" stroke-width="1" stroke-dasharray="3,3"/>
</svg>