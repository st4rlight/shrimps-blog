<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fee2e2;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#fecaca;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dcfce7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#bbf7d0;stop-opacity:0.8" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">范式 vs 性能：工程中的权衡</text>
  <text x="350" y="55" text-anchor="middle" font-size="12" fill="#94a3b8">范式越高，冗余越少，但查询 JOIN 越多</text>

  <!-- Axes -->
  <!-- Y-axis: Normalization Level -->
  <line x1="100" y1="80" x2="100" y2="320" stroke="#94a3b8" stroke-width="2"/>
  <text x="60" y="200" text-anchor="middle" font-size="12" fill="#64748b" transform="rotate(-90,60,200)">规范化程度 →</text>
  
  <!-- X-axis: Number of tables/JOINs -->
  <line x1="100" y1="320" x2="650" y2="320" stroke="#94a3b8" stroke-width="2"/>
  <text x="375" y="355" text-anchor="middle" font-size="12" fill="#64748b">表拆分程度 / JOIN 复杂度 →</text>

  <!-- Grid lines -->
  <line x1="100" y1="140" x2="630" y2="140" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="200" x2="630" y2="200" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="260" x2="630" y2="260" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  
  <line x1="230" y1="80" x2="230" y2="320" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="370" y1="80" x2="370" y2="320" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="500" y1="80" x2="500" y2="320" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Redundancy curve (decreasing) -->
  <path d="M 140 95 C 200 110, 280 160, 350 210 S 520 290, 610 305" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="600" y="290" font-size="10" fill="#ef4444" font-weight="600">数据冗余</text>

  <!-- JOIN complexity curve (increasing) -->
  <path d="M 140 305 C 200 290, 280 240, 350 200 S 520 110, 610 95" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="600" y="90" font-size="10" fill="#3b82f6" font-weight="600">JOIN 复杂度</text>

  <!-- Sweet spot zone -->
  <rect x="280" y="140" width="140" height="130" rx="8" fill="#f0fdf4" fill-opacity="0.6" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="350" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">🎯 最佳实践区</text>
  <text x="350" y="188" text-anchor="middle" font-size="10" fill="#15803d">OLTP: 3NF</text>
  <text x="350" y="205" text-anchor="middle" font-size="10" fill="#15803d">数据仓库: 2NF/1NF</text>

  <!-- NF markers on Y-axis -->
  <g>
    <rect x="72" y="82" width="40" height="18" rx="4" fill="#dbeafe"/>
    <text x="92" y="95" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">1NF</text>
  </g>
  <g>
    <rect x="72" y="132" width="40" height="18" rx="4" fill="#dcfce7"/>
    <text x="92" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">2NF</text>
  </g>
  <g>
    <rect x="72" y="192" width="40" height="18" rx="4" fill="#fef3c7"/>
    <text x="92" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">3NF</text>
  </g>
  <g>
    <rect x="72" y="252" width="40" height="18" rx="4" fill="#fee2e2"/>
    <text x="92" y="265" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">BCNF</text>
  </g>

  <!-- Bottom legend -->
  <rect x="100" y="368" width="500" height="28" rx="6" fill="#f1f5f9"/>
  <text x="350" y="387" text-anchor="middle" font-size="11" fill="#64748b">💡 过度规范化 → JOIN 爆炸；反范式设计 → 用空间换时间，适合读多写少场景</text>
</svg>