<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 480" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="headerG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="480" rx="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="420" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">数仓表命名规范</text>
  <text x="420" y="56" text-anchor="middle" font-size="12" fill="#94a3b8">统一命名格式，提升可读性和可维护性</text>

  <!-- ===== Naming Structure Diagram ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="80" width="780" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  </g>

  <!-- Example: ad_crm.dwd_crm_performance_accounting_cost_detail_df -->
  <!-- ad_crm (库名) -->
  <rect x="50" y="100" width="70" height="60" rx="8" fill="#e9d5ff" stroke="#a855f7" stroke-width="2"/>
  <text x="85" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">ad_crm</text>
  <text x="85" y="145" text-anchor="middle" font-size="9" fill="#9333ea">库名</text>

  <text x="128" y="135" font-size="14" fill="#94a3b8">.</text>

  <!-- dwd (数据分层) -->
  <rect x="140" y="100" width="50" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="165" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">dwd</text>
  <text x="165" y="145" text-anchor="middle" font-size="9" fill="#16a34a">数据分层</text>

  <text x="198" y="135" font-size="14" fill="#94a3b8">_</text>

  <!-- crm (业务板块) -->
  <rect x="210" y="100" width="50" height="60" rx="8" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="235" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#a16207">crm</text>
  <text x="235" y="145" text-anchor="middle" font-size="9" fill="#ca8a04">业务板块</text>

  <text x="268" y="135" font-size="14" fill="#94a3b8">_</text>

  <!-- performance (数据域) -->
  <rect x="280" y="100" width="90" height="60" rx="8" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
  <text x="325" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#b91c1c">performance</text>
  <text x="325" y="145" text-anchor="middle" font-size="9" fill="#dc2626">数据域</text>

  <text x="378" y="135" font-size="14" fill="#94a3b8">_</text>

  <!-- accounting (主题) -->
  <rect x="390" y="100" width="80" height="60" rx="8" fill="#a5f3fc" stroke="#06b6d4" stroke-width="2"/>
  <text x="430" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#0e7490">accounting</text>
  <text x="430" y="145" text-anchor="middle" font-size="9" fill="#0891b2">主题</text>

  <text x="478" y="135" font-size="14" fill="#94a3b8">_</text>

  <!-- cost_detail (自定义信息) -->
  <rect x="490" y="100" width="90" height="60" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="2"/>
  <text x="535" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">cost_detail</text>
  <text x="535" y="145" text-anchor="middle" font-size="9" fill="#ea580c">自定义信息</text>

  <text x="588" y="135" font-size="14" fill="#94a3b8">_</text>

  <!-- df (周期+分区标识) -->
  <rect x="600" y="100" width="40" height="60" rx="8" fill="#fbcfe8" stroke="#ec4899" stroke-width="2"/>
  <text x="620" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#be185d">df</text>
  <text x="620" y="145" text-anchor="middle" font-size="9" fill="#db2777">周期+分区</text>

  <!-- Arrows pointing down to descriptions -->
  <line x1="85" y1="160" x2="85" y2="175" stroke="#a855f7" stroke-width="1.5"/>
  <line x1="165" y1="160" x2="165" y2="175" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="235" y1="160" x2="235" y2="175" stroke="#eab308" stroke-width="1.5"/>
  <line x1="325" y1="160" x2="325" y2="175" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="430" y1="160" x2="430" y2="175" stroke="#06b6d4" stroke-width="1.5"/>
  <line x1="535" y1="160" x2="535" y2="175" stroke="#f97316" stroke-width="1.5"/>
  <line x1="620" y1="160" x2="620" y2="175" stroke="#ec4899" stroke-width="1.5"/>

  <!-- ===== Legend / Reference ===== -->

  <!-- 数据分层 -->
  <g filter="url(#shadow)">
    <rect x="30" y="220" width="380" height="110" rx="10" fill="white" stroke="#22c55e" stroke-width="1.5"/>
  </g>
  <rect x="30" y="220" width="380" height="28" rx="10" fill="#dcfce7"/>
  <text x="220" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">数据分层标识</text>

  <text x="50" y="268" font-size="10" fill="#374151"><tspan font-weight="600" fill="#15803d">ods</tspan> - 贴源层（Operational Data Store）</text>
  <text x="50" y="288" font-size="10" fill="#374151"><tspan font-weight="600" fill="#15803d">dwd</tspan> - 明细层（Data Warehouse Detail）</text>
  <text x="50" y="308" font-size="10" fill="#374151"><tspan font-weight="600" fill="#15803d">dws</tspan> - 汇总层（Data Warehouse Summary）</text>
  <text x="50" y="328" font-size="10" fill="#374151"><tspan font-weight="600" fill="#15803d">ads</tspan> - 应用层（Application Data Store）</text>
  <text x="220" y="268" font-size="10" fill="#374151"><tspan font-weight="600" fill="#d97706">dim</tspan> - 维度层（Dimension）</text>

  <!-- 周期标识 -->
  <g filter="url(#shadow)">
    <rect x="430" y="220" width="180" height="110" rx="10" fill="white" stroke="#ec4899" stroke-width="1.5"/>
  </g>
  <rect x="430" y="220" width="180" height="28" rx="10" fill="#fce7f3"/>
  <text x="520" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#be185d">周期标识</text>

  <text x="450" y="268" font-size="10" fill="#374151"><tspan font-weight="600" fill="#db2777">h</tspan> - 小时（hour）</text>
  <text x="450" y="288" font-size="10" fill="#374151"><tspan font-weight="600" fill="#db2777">d</tspan> - 天（day）</text>
  <text x="450" y="308" font-size="10" fill="#374151"><tspan font-weight="600" fill="#db2777">w</tspan> - 周（week）</text>
  <text x="530" y="268" font-size="10" fill="#374151"><tspan font-weight="600" fill="#db2777">m</tspan> - 月（month）</text>
  <text x="530" y="288" font-size="10" fill="#374151"><tspan font-weight="600" fill="#db2777">q</tspan> - 季度（quarter）</text>
  <text x="530" y="308" font-size="10" fill="#374151"><tspan font-weight="600" fill="#db2777">y</tspan> - 年（year）</text>

  <!-- 分区标识 -->
  <g filter="url(#shadow)">
    <rect x="630" y="220" width="180" height="110" rx="10" fill="white" stroke="#06b6d4" stroke-width="1.5"/>
  </g>
  <rect x="630" y="220" width="180" height="28" rx="10" fill="#cffafe"/>
  <text x="720" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#0e7490">分区标识</text>

  <text x="650" y="270" font-size="10" fill="#374151"><tspan font-weight="600" fill="#0891b2">f</tspan> - full 全量</text>
  <text x="650" y="295" font-size="10" fill="#374151"><tspan font-weight="600" fill="#0891b2">i</tspan> - increase 增量</text>

  <text x="650" y="320" font-size="9" fill="#64748b">示例：df = 天级全量</text>
  <text x="650" y="335" font-size="9" fill="#64748b">　　　di = 天级增量</text>

  <!-- ===== More Examples ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="350" width="780" height="110" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <rect x="30" y="350" width="780" height="28" rx="10" fill="#f1f5f9"/>
  <text x="420" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">命名示例</text>

  <!-- Example 1 -->
  <text x="50" y="400" font-size="10" font-family="monospace" fill="#1e293b">ad_trade.dwd_trade_order_detail_di</text>
  <text x="50" y="415" font-size="9" fill="#64748b">广告域-交易明细层-订单明细-天级增量</text>

  <!-- Example 2 -->
  <text x="320" y="400" font-size="10" font-family="monospace" fill="#1e293b">ad_user.dws_user_active_1d_df</text>
  <text x="320" y="415" font-size="9" fill="#64748b">广告域-用户汇总层-活跃用户1日-天级全量</text>

  <!-- Example 3 -->
  <text x="580" y="400" font-size="10" font-family="monospace" fill="#1e293b">ad_common.dim_date_full_df</text>
  <text x="580" y="415" font-size="9" fill="#64748b">广告域-维度层-日期维度-全量</text>

  <!-- Example 4 -->
  <text x="50" y="440" font-size="10" font-family="monospace" fill="#1e293b">ad_report.ads_gmv_daily_report_df</text>
  <text x="50" y="455" font-size="9" fill="#64748b">广告域-应用层-GMV日报-天级全量</text>

  <!-- Bottom tip -->
  <rect x="320" y="430" width="480" height="26" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="560" y="448" text-anchor="middle" font-size="10" fill="#92400e">💡 命名规范建议从第一天严格执行，后期修改成本极高</text>
</svg>