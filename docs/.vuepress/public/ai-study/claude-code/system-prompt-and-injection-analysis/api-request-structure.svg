<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="violetG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="540" rx="14" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">API 请求的最终结构</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#94a3b8">五层注入架构合并为三大部分，按变化频率从低到高排列</text>

  <!-- ===== Part 1: System ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="70" width="720" height="150" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="40" y="70" width="720" height="28" rx="10" fill="url(#blueG)"/>
  <rect x="40" y="82" width="720" height="16" fill="url(#blueG)"/>
  <text x="60" y="92" font-size="13" font-weight="700" fill="white">① system: TextBlockParam[]</text>
  <text x="720" y="92" font-size="9" fill="white" text-anchor="end">按变化频率 ↑ 递增</text>

  <!-- Row 1: buffer -->
  <rect x="58" y="110" width="340" height="24" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="68" y="126" font-size="9.5" fill="#991b1b">Attribution Header</text>
  <rect x="240" y="112" width="50" height="14" rx="3" fill="#ef4444" opacity="0.2"/>
  <text x="265" y="122" text-anchor="middle" font-size="7.5" font-weight="600" fill="#ef4444">null</text>

  <rect x="410" y="110" width="330" height="24" rx="5" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="420" y="126" font-size="9.5" fill="#92400e">Identity Prefix</text>
  <rect x="690" y="112" width="40" height="14" rx="3" fill="#f59e0b" opacity="0.2"/>
  <text x="710" y="122" text-anchor="middle" font-size="7.5" font-weight="600" fill="#d97706">null</text>

  <!-- Row 2: static -->
  <rect x="58" y="140" width="340" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="68" y="158" font-size="10" font-weight="600" fill="#1d4ed8">静态区（7 sections）</text>
  <rect x="240" y="144" width="58" height="14" rx="3" fill="#3b82f6" opacity="0.2"/>
  <text x="269" y="154" text-anchor="middle" font-size="8" font-weight="700" fill="#2563eb">global</text>

  <!-- Row 3: dynamic + sys context -->
  <rect x="410" y="140" width="170" height="28" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="420" y="158" font-size="9.5" fill="#92400e">动态区（10~13 sec.）</text>

  <rect x="590" y="140" width="150" height="28" rx="5" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
  <text x="600" y="158" font-size="9.5" fill="#9d174d">System Context (Git)</text>

  <!-- Summary -->
  <text x="60" y="192" font-size="9" fill="#64748b">几乎不变 → global 缓存</text>
  <text x="300" y="192" font-size="9" fill="#64748b">会话内不变 → null 缓存</text>
  <text x="550" y="192" font-size="9" fill="#64748b">启动时快照 → null 缓存</text>

  <!-- ===== Part 2: Messages ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="232" width="720" height="140" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="40" y="232" width="720" height="28" rx="10" fill="url(#greenG)"/>
  <rect x="40" y="244" width="720" height="16" fill="url(#greenG)"/>
  <text x="60" y="254" font-size="13" font-weight="700" fill="white">② messages: MessageParam[]</text>

  <!-- Message entries -->
  <rect x="58" y="272" width="220" height="36" rx="6" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="68" y="288" font-size="9" font-weight="600" fill="#047857">User Context</text>
  <text x="68" y="300" font-size="8" fill="#059669">CLAUDE.md + 日期</text>

  <rect x="290" y="272" width="220" height="36" rx="6" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="300" y="288" font-size="9" font-weight="600" fill="#374151">用户消息 + Attachments</text>
  <text x="300" y="300" font-size="8" fill="#64748b">@文件 · 诊断 · TODO · delta</text>

  <rect x="522" y="272" width="220" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="532" y="288" font-size="9" font-weight="600" fill="#475569">assistant / user 交替</text>
  <text x="532" y="300" font-size="8" fill="#94a3b8">模型回复 → 工具调用 → 工具结果</text>

  <!-- Cache breakpoint -->
  <rect x="58" y="316" width="684" height="20" rx="5" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="400" y="330" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">末尾最新消息带 cache_control 标记 — 建立缓存边界</text>

  <!-- Summary -->
  <text x="60" y="354" font-size="9" fill="#64748b">用户触发变化 → 放消息流，不影响 system prompt 缓存</text>
  <text x="500" y="354" font-size="9" fill="#64748b">每轮变化 → 附件注入</text>

  <!-- ===== Part 3: Tools ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="384" width="720" height="90" rx="10" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <rect x="40" y="384" width="720" height="28" rx="10" fill="url(#violetG)"/>
  <rect x="40" y="396" width="720" height="16" fill="url(#violetG)"/>
  <text x="60" y="406" font-size="13" font-weight="700" fill="white">③ tools: ToolParam[]</text>

  <rect x="58" y="424" width="340" height="20" rx="5" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="68" y="438" font-size="9" fill="#5b21b6">内置工具（按名称排序）Agent · Bash · Edit · Read · ...</text>
  <rect x="310" y="426" width="80" height="14" rx="3" fill="#8b5cf6" opacity="0.2"/>
  <text x="350" y="436" text-anchor="middle" font-size="7.5" font-weight="700" fill="#7c3aed">global ✅</text>

  <rect x="410" y="424" width="170" height="20" rx="5" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="420" y="438" font-size="9" fill="#7c3aed">MCP 工具（排序 + defer）</text>

  <rect x="590" y="424" width="150" height="20" rx="5" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="600" y="438" font-size="9" fill="#8b5cf6">Server Tools（追加末尾）</text>

  <text x="60" y="464" font-size="9" fill="#64748b">固定排序 → 缓存 hash 稳定 → 跨用户缓存</text>
  <text x="450" y="464" font-size="9" fill="#64748b">延迟加载 → delta 附件增量声明</text>

  <!-- ===== Bottom tip: change frequency ===== -->
  <rect x="60" y="490" width="680" height="40" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="506" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">核心逻辑：按变化频率分层</text>
  <text x="400" y="522" text-anchor="middle" font-size="9" fill="#64748b">几乎不变 (global) → 会话内不变 (null) → 每轮变化 (附件) → 用户触发 (user context)</text>
</svg>
