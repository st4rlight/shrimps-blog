<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="440" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">全量同步 vs 增量同步</text>
  <text x="400" y="55" text-anchor="middle" font-size="12" fill="#94a3b8">两种方案的核心差异与适用场景对比</text>

  <!-- ===== Left: 全量同步 ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="75" width="355" height="280" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="30" y="75" width="355" height="40" rx="12" fill="url(#blueG)"/>
  <rect x="30" y="95" width="355" height="20" fill="url(#blueG)"/>
  <text x="207" y="101" text-anchor="middle" font-size="16" font-weight="700" fill="white">全量同步</text>

  <!-- Left content: flow -->
  <g transform="translate(55, 135)">
    <rect width="80" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="40" y="23" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">MySQL</text>
  </g>
  <line x1="135" y1="153" x2="165" y2="153" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(170, 135)">
    <rect width="80" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="40" y="23" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Sqoop</text>
  </g>
  <line x1="250" y1="153" x2="280" y2="153" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(285, 135)">
    <rect width="80" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
    <text x="40" y="23" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Hive</text>
  </g>

  <!-- Left properties -->
  <g transform="translate(50, 190)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#1e293b">核心特征</text>
    
    <circle cx="8" cy="18" r="4" fill="#3b82f6"/>
    <text x="18" y="22" font-size="11" fill="#475569">每次抽取源表<strong>全部数据</strong>覆盖写入</text>
    
    <circle cx="8" cy="40" r="4" fill="#3b82f6"/>
    <text x="18" y="44" font-size="11" fill="#475569">实现简单，Sqoop 一行命令</text>
    
    <circle cx="8" cy="62" r="4" fill="#3b82f6"/>
    <text x="18" y="66" font-size="11" fill="#475569">天然支持首次数据初始化</text>
  </g>

  <!-- Left: pain points -->
  <rect x="45" y="278" width="320" height="62" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="55" y="296" font-size="10" font-weight="600" fill="#991b1b">⚠ 局限性</text>
  <text x="55" y="312" font-size="10" fill="#64748b">• 全表扫描，对 MySQL 影响大</text>
  <text x="55" y="328" font-size="10" fill="#64748b">• 不支持 Update/Delete  • 存储冗余高</text>

  <!-- Left: 适用场景 -->
  <rect x="45" y="348" width="320" height="2" fill="#e2e8f0"/>
  <text x="55" y="340" font-size="10" font-weight="600" fill="#475569">适用：小维度表、维表快照、首次初始化</text>

  <!-- ===== VS circle ===== -->
  <circle cx="400" cy="215" r="24" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="400" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#94a3b8">VS</text>

  <!-- ===== Right: 增量同步 ===== -->
  <g filter="url(#shadow)">
    <rect x="415" y="75" width="355" height="280" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="415" y="75" width="355" height="40" rx="12" fill="url(#greenG)"/>
  <rect x="415" y="95" width="355" height="20" fill="url(#greenG)"/>
  <text x="592" y="101" text-anchor="middle" font-size="16" font-weight="700" fill="white">增量同步（CDC + Merge）</text>

  <!-- Right content: flow -->
  <g transform="translate(440, 135)">
    <rect width="60" height="36" rx="8" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
    <text x="30" y="23" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">MySQL</text>
  </g>
  <line x1="500" y1="153" x2="520" y2="153" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(525, 135)">
    <rect width="60" height="36" rx="8" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
    <text x="30" y="23" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">Canal</text>
  </g>
  <line x1="585" y1="153" x2="605" y2="153" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(610, 135)">
    <rect width="60" height="36" rx="8" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
    <text x="30" y="23" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">Kafka</text>
  </g>
  <line x1="670" y1="153" x2="690" y2="153" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(695, 135)">
    <rect width="60" height="36" rx="8" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
    <text x="30" y="23" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">Merge</text>
  </g>

  <!-- Right properties -->
  <g transform="translate(435, 190)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#1e293b">核心特征</text>
    
    <circle cx="8" cy="18" r="4" fill="#10b981"/>
    <text x="18" y="22" font-size="11" fill="#475569">只捕获<strong>变更数据</strong>，与存量合并</text>
    
    <circle cx="8" cy="40" r="4" fill="#10b981"/>
    <text x="18" y="44" font-size="11" fill="#475569">对源库无影响，读 Binlog 即可</text>
    
    <circle cx="8" cy="62" r="4" fill="#10b981"/>
    <text x="18" y="66" font-size="11" fill="#475569">完整支持 Insert/Update/Delete</text>
  </g>

  <!-- Right: advantages -->
  <rect x="430" y="278" width="320" height="62" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="440" y="296" font-size="10" font-weight="600" fill="#15803d">✓ 优势</text>
  <text x="440" y="312" font-size="10" fill="#64748b">• 存储高效，只存增量  • 数据一致性好</text>
  <text x="440" y="328" font-size="10" fill="#64748b">• 适配分库分表  • 近实时采集</text>

  <!-- Right: 适用场景 -->
  <rect x="430" y="348" width="320" height="2" fill="#e2e8f0"/>
  <text x="440" y="340" font-size="10" font-weight="600" fill="#475569">适用：大事实表、频繁变更表、分库分表</text>

  <!-- Bottom tip -->
  <rect x="170" y="385" width="460" height="28" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="400" y="404" text-anchor="middle" font-size="11" fill="#15803d">💡 实践建议：全量与增量混合使用——小表用全量、大表用增量</text>
</svg>