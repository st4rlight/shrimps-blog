<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="440" rx="14" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">附件计算时序</text>
  <text x="400" y="54" text-anchor="middle" font-size="12" fill="#94a3b8">getAttachments() — 两步并行计算，30+ 种附件有序注入</text>

  <!-- ===== Step 1: User Input ===== -->
  <rect x="30" y="72" width="90" height="24" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="75" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">Step 1</text>

  <g filter="url(#shadow)">
    <rect x="30" y="104" width="740" height="80" rx="10" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <rect x="30" y="104" width="740" height="32" rx="10" fill="url(#blueG)"/>
  <rect x="30" y="120" width="740" height="16" fill="url(#blueG)"/>
  <text x="400" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="white">用户输入附件（必须先完成）</text>

  <text x="55" y="155" font-size="11" fill="#374151">📄 at_mentioned_files</text>
  <text x="235" y="155" font-size="11" fill="#374151">🔗 mcp_resources</text>
  <text x="415" y="155" font-size="11" fill="#374151">🤖 agent_mentions</text>
  <text x="595" y="155" font-size="11" fill="#374151">🔍 skill_discovery</text>
  <text x="55" y="173" font-size="10" fill="#94a3b8">@引用的文件内容，触发条件规则匹配</text>

  <!-- Arrow from Step 1 to Step 2 -->
  <line x1="400" y1="184" x2="400" y2="210" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="335" y="192" width="130" height="16" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="400" y="203" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">用户输入解析完成</text>

  <!-- ===== Step 2: Parallel ===== -->
  <rect x="30" y="216" width="90" height="24" rx="12" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="75" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">Step 2</text>

  <!-- Promise.all bracket -->
  <text x="400" y="250" text-anchor="middle" font-size="10" fill="#64748b">Promise.all — 并行计算</text>

  <!-- Left: Thread Attachments -->
  <g filter="url(#shadow)">
    <rect x="30" y="262" width="370" height="130" rx="10" fill="white" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="30" y="262" width="370" height="30" rx="10" fill="url(#greenG)"/>
  <rect x="30" y="278" width="370" height="14" fill="url(#greenG)"/>
  <text x="215" y="283" text-anchor="middle" font-size="13" font-weight="700" fill="white">线程附件（子 Agent 可用）</text>

  <text x="50" y="310" font-size="11" fill="#374151">📝 nested_memory</text>
  <text x="200" y="310" font-size="11" fill="#374151">🔄 delta (Tools/MCP/Agent)</text>
  <text x="50" y="330" font-size="11" fill="#374151">✅ todo / task_reminders</text>
  <text x="200" y="330" font-size="11" fill="#374151">📋 plan / auto_mode</text>
  <text x="50" y="350" font-size="11" fill="#374151">🎯 skill_listing</text>
  <text x="200" y="350" font-size="11" fill="#374151">📧 teammate_mailbox</text>
  <text x="50" y="378" font-size="10" fill="#047857">🛡️ maybe() 包裹 — 任何附件失败都不阻塞</text>

  <!-- Right: Main Thread Attachments -->
  <g filter="url(#shadow)">
    <rect x="410" y="262" width="370" height="130" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="410" y="262" width="370" height="30" rx="10" fill="url(#amberG)"/>
  <rect x="410" y="278" width="370" height="14" fill="url(#amberG)"/>
  <text x="595" y="283" text-anchor="middle" font-size="13" font-weight="700" fill="white">主线程附件（仅主会话）</text>

  <text x="430" y="310" font-size="11" fill="#374151">🖥️ diagnostics / LSP</text>
  <text x="590" y="310" font-size="11" fill="#374151">📊 token_usage</text>
  <text x="430" y="330" font-size="11" fill="#374151">📁 changed_files</text>
  <text x="590" y="330" font-size="11" fill="#374151">🎨 output_style</text>
  <text x="430" y="350" font-size="11" fill="#374151">⚡ post-compact re-inject</text>
  <text x="590" y="350" font-size="11" fill="#374151">🔔 async_hooks</text>
  <text x="430" y="378" font-size="10" fill="#92400e">⚠️ 不安全，子 Agent 不可见</text>

  <!-- Merge arrow -->
  <line x1="215" y1="392" x2="215" y2="414" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="595" y1="392" x2="595" y2="414" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="215" y1="414" x2="595" y2="414" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="400" y1="414" x2="400" y2="428" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <rect x="310" y="420" width="180" height="18" rx="9" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="400" y="433" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">合并 → 注入 user message</text>
</svg>
