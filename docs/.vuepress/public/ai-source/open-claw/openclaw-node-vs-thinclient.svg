<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="redG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">设备节点 vs 薄客户端</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#94a3b8">Node 是有设备身份、能声明能力、执行命令的主动节点</text>

  <!-- Left: Thin Client -->
  <g filter="url(#shadow)">
    <rect x="30" y="64" width="350" height="210" rx="10" fill="white" stroke="#ef4444" stroke-width="2"/>
  </g>
  <rect x="30" y="64" width="350" height="32" rx="10" fill="url(#redG)"/>
  <rect x="30" y="82" width="350" height="14" fill="url(#redG)"/>
  <text x="205" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="white">❌ 薄客户端模式</text>

  <!-- Comparison items -->
  <g>
    <rect x="45" y="106" width="320" height="26" rx="6" fill="#fee2e2"/>
    <text x="55" y="123" font-size="10" fill="#991b1b">身份：匿名请求者</text>
  </g>
  <g>
    <rect x="45" y="138" width="320" height="26" rx="6" fill="#fee2e2"/>
    <text x="55" y="155" font-size="10" fill="#991b1b">能力：无本地能力</text>
  </g>
  <g>
    <rect x="45" y="170" width="320" height="26" rx="6" fill="#fee2e2"/>
    <text x="55" y="187" font-size="10" fill="#991b1b">通信：请求-响应（单向）</text>
  </g>
  <g>
    <rect x="45" y="202" width="320" height="26" rx="6" fill="#fee2e2"/>
    <text x="55" y="219" font-size="10" fill="#991b1b">安全：Cookie / Token</text>
  </g>
  <g>
    <rect x="45" y="234" width="320" height="26" rx="6" fill="#fee2e2"/>
    <text x="55" y="251" font-size="10" fill="#991b1b">生命周期：每次请求独立</text>
  </g>

  <!-- VS circle -->
  <circle cx="400" cy="168" r="22" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="400" y="173" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">VS</text>

  <!-- Right: Device Node -->
  <g filter="url(#shadow)">
    <rect x="420" y="64" width="350" height="210" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="420" y="64" width="350" height="32" rx="10" fill="url(#greenG)"/>
  <rect x="420" y="82" width="350" height="14" fill="url(#greenG)"/>
  <text x="595" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="white">✅ OpenClaw 设备节点</text>

  <!-- Comparison items -->
  <g>
    <rect x="435" y="106" width="320" height="26" rx="6" fill="#d1fae5"/>
    <text x="445" y="123" font-size="10" fill="#047857">身份：有设备身份的节点（key pair）</text>
  </g>
  <g>
    <rect x="435" y="138" width="320" height="26" rx="6" fill="#d1fae5"/>
    <text x="445" y="155" font-size="10" fill="#047857">能力：暴露本地能力（camera/screen/...）</text>
  </g>
  <g>
    <rect x="435" y="170" width="320" height="26" rx="6" fill="#d1fae5"/>
    <text x="445" y="187" font-size="10" fill="#047857">通信：双向（事件订阅 + 命令执行）</text>
  </g>
  <g>
    <rect x="435" y="202" width="320" height="26" rx="6" fill="#d1fae5"/>
    <text x="445" y="219" font-size="10" fill="#047857">安全：设备配对 + challenge 签名</text>
  </g>
  <g>
    <rect x="435" y="234" width="320" height="26" rx="6" fill="#d1fae5"/>
    <text x="445" y="251" font-size="10" fill="#047857">生命周期：长连接 + 在线状态</text>
  </g>

  <!-- Node connection model -->
  <text x="400" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Node 连接模型</text>

  <!-- Gateway center -->
  <g filter="url(#shadow)">
    <rect x="310" y="312" width="180" height="44" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="310" y="312" width="180" height="24" rx="10" fill="url(#blueG)"/>
  <rect x="310" y="326" width="180" height="10" fill="url(#blueG)"/>
  <text x="400" y="330" text-anchor="middle" font-size="11" font-weight="700" fill="white">Gateway :18789</text>
  <text x="400" y="349" text-anchor="middle" font-size="9" fill="#64748b">WS 消息总线</text>

  <!-- iOS Node -->
  <g filter="url(#shadow)">
    <rect x="30" y="314" width="130" height="40" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <text x="95" y="331" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">📱 iOS Node</text>
  <text x="95" y="347" text-anchor="middle" font-size="8" fill="#94a3b8">camera · location</text>
  <line x1="160" y1="334" x2="310" y2="334" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- macOS Node -->
  <g filter="url(#shadow)">
    <rect x="30" y="366" width="130" height="40" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <text x="95" y="383" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">🖥 macOS Node</text>
  <text x="95" y="399" text-anchor="middle" font-size="8" fill="#94a3b8">screen · system.run</text>
  <line x1="160" y1="386" x2="310" y2="356" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Android Node -->
  <g filter="url(#shadow)">
    <rect x="30" y="418" width="130" height="40" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <text x="95" y="435" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">🤖 Android Node</text>
  <text x="95" y="451" text-anchor="middle" font-size="8" fill="#94a3b8">camera · voice</text>
  <line x1="160" y1="438" x2="310" y2="360" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Operator -->
  <g filter="url(#shadow)">
    <rect x="630" y="314" width="130" height="40" rx="8" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <text x="695" y="331" text-anchor="middle" font-size="10" font-weight="600" fill="#8b5cf6">👨‍💻 Operator</text>
  <text x="695" y="347" text-anchor="middle" font-size="8" fill="#94a3b8">CLI / WebChat</text>
  <line x1="630" y1="334" x2="490" y2="334" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- system.run approval -->
  <g filter="url(#shadow)">
    <rect x="540" y="370" width="220" height="90" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="540" y="370" width="220" height="24" rx="10" fill="url(#amberG)"/>
  <rect x="540" y="384" width="220" height="10" fill="url(#amberG)"/>
  <text x="650" y="388" text-anchor="middle" font-size="10" font-weight="700" fill="white">system.run 审批策略</text>

  <rect x="555" y="400" width="190" height="18" rx="4" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="650" y="413" text-anchor="middle" font-size="8" font-weight="600" fill="#047857">allowlist — 只执行白名单</text>

  <rect x="555" y="422" width="190" height="18" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="650" y="435" text-anchor="middle" font-size="8" font-weight="600" fill="#92400e">ask on-miss — 白名单外请求审批</text>

  <rect x="555" y="444" width="190" height="18" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="650" y="457" text-anchor="middle" font-size="8" font-weight="600" fill="#991b1b">ask always — 所有命令都请求审批</text>
</svg>
