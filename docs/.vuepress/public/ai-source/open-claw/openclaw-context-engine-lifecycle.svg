<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="blueG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="460" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Context Engine 生命周期与检疫机制</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#94a3b8">可替换接口 — 崩了自动降级到 Legacy，外部引擎参数不兼容也有兼容层兜底</text>

  <!-- Top: Engine lifecycle flow -->
  <text x="400" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">引擎生命周期</text>

  <!-- Bootstrap -->
  <g filter="url(#shadow)">
    <rect x="40" y="82" width="100" height="40" rx="8" fill="white" stroke="#6366f1" stroke-width="1.5"/>
  </g>
  <text x="90" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">bootstrap()</text>

  <line x1="140" y1="102" x2="160" y2="102" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Loop bracket -->
  <rect x="162" y="78" width="440" height="50" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="382" y="90" text-anchor="middle" font-size="8" fill="#94a3b8">每次 Agent Turn 循环</text>

  <!-- ingest -->
  <g filter="url(#shadow)">
    <rect x="172" y="96" width="80" height="26" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <text x="212" y="113" text-anchor="middle" font-size="9" font-weight="600" fill="#3b82f6">ingest()</text>

  <line x1="252" y1="109" x2="268" y2="109" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- assemble -->
  <g filter="url(#shadow)">
    <rect x="270" y="96" width="85" height="26" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <text x="312" y="113" text-anchor="middle" font-size="9" font-weight="600" fill="#3b82f6">assemble()</text>

  <line x1="355" y1="109" x2="371" y2="109" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- LLM call -->
  <rect x="373" y="96" width="65" height="26" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="405" y="113" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">LLM</text>

  <line x1="438" y1="109" x2="454" y2="109" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- afterTurn -->
  <g filter="url(#shadow)">
    <rect x="456" y="96" width="85" height="26" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <text x="498" y="113" text-anchor="middle" font-size="9" font-weight="600" fill="#10b981">afterTurn()</text>

  <line x1="541" y1="109" x2="557" y2="109" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- maintain -->
  <g filter="url(#shadow)">
    <rect x="559" y="96" width="85" height="26" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <text x="601" y="113" text-anchor="middle" font-size="9" font-weight="600" fill="#10b981">maintain()</text>

  <!-- compact (below) -->
  <line x1="602" y1="122" x2="602" y2="142" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <g filter="url(#shadow)">
    <rect x="540" y="144" width="125" height="26" rx="6" fill="white" stroke="#ef4444" stroke-width="1.5"/>
  </g>
  <text x="602" y="161" text-anchor="middle" font-size="9" font-weight="600" fill="#ef4444">compact() 需要时</text>

  <!-- Quarantine section -->
  <text x="400" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">检疫代理：运行时故障自动降级</text>

  <!-- Normal flow -->
  <g filter="url(#shadow)">
    <rect x="40" y="216" width="200" height="70" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="40" y="216" width="200" height="26" rx="10" fill="url(#blueG)"/>
  <rect x="40" y="230" width="200" height="12" fill="url(#blueG)"/>
  <text x="140" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="white">自定义 Engine</text>
  <text x="140" y="258" text-anchor="middle" font-size="10" fill="#475569">memory-lancedb / honcho</text>
  <text x="140" y="274" text-anchor="middle" font-size="9" fill="#94a3b8">9 个被保护方法</text>

  <!-- Call arrow -->
  <line x1="240" y1="251" x2="290" y2="251" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="246" font-size="8" fill="#94a3b8">调用</text>

  <!-- Proxy wrapper -->
  <g filter="url(#shadow)">
    <rect x="292" y="220" width="180" height="62" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <rect x="292" y="220" width="180" height="24" rx="10" fill="url(#amberG)"/>
  <rect x="292" y="232" width="180" height="12" fill="url(#amberG)"/>
  <text x="382" y="236" text-anchor="middle" font-size="10" font-weight="700" fill="white">检疫代理 Proxy</text>
  <text x="382" y="260" text-anchor="middle" font-size="9" fill="#475569">检查是否已检疫</text>
  <text x="382" y="274" text-anchor="middle" font-size="9" fill="#475569">失败 → 标记检疫 + 降级</text>

  <!-- Success path -->
  <line x1="472" y1="240" x2="530" y2="216" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="500" y="220" font-size="8" fill="#10b981">成功</text>

  <!-- Fail path -->
  <line x1="472" y1="262" x2="530" y2="286" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="500" y="284" font-size="8" fill="#ef4444">失败</text>

  <!-- Success: normal result -->
  <g filter="url(#shadow)">
    <rect x="532" y="200" width="230" height="36" rx="8" fill="#d1fae5" stroke="#86efac" stroke-width="1.5"/>
  </g>
  <text x="647" y="222" text-anchor="middle" font-size="10" font-weight="600" fill="#047857">✅ 正常返回结果</text>

  <!-- Fail: quarantine -->
  <g filter="url(#shadow)">
    <rect x="532" y="274" width="230" height="56" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  </g>
  <text x="647" y="294" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">⛔ 标记检疫 + 降级到 Legacy</text>
  <text x="647" y="310" text-anchor="middle" font-size="9" fill="#991b1b">assemble → 调用 Legacy assemble</text>
  <text x="647" y="324" text-anchor="middle" font-size="9" fill="#991b1b">compact / prepareSubagentSpawn → 不降级，抛异常</text>

  <!-- Memory plugins -->
  <text x="400" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">记忆插件家族（4 个并行插件）</text>

  <!-- Memory Core -->
  <g filter="url(#shadow)">
    <rect x="40" y="370" width="170" height="50" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <rect x="40" y="370" width="170" height="22" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="125" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#1d4ed8">Memory Core</text>
  <text x="125" y="408" text-anchor="middle" font-size="8" fill="#64748b">工具契约 · Dreaming</text>

  <!-- Memory LanceDB -->
  <g filter="url(#shadow)">
    <rect x="225" y="370" width="170" height="50" rx="8" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <rect x="225" y="370" width="170" height="22" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="310" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#5b21b6">Memory LanceDB</text>
  <text x="310" y="408" text-anchor="middle" font-size="8" fill="#64748b">向量存储 · autoCapture</text>

  <!-- Memory Wiki -->
  <g filter="url(#shadow)">
    <rect x="410" y="370" width="170" height="50" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="410" y="370" width="170" height="22" rx="8" fill="#d1fae5" stroke="#86efac" stroke-width="1"/>
  <text x="495" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#047857">Memory Wiki</text>
  <text x="495" y="408" text-anchor="middle" font-size="8" fill="#64748b">Wiki 风格知识库</text>

  <!-- Active Memory -->
  <g filter="url(#shadow)">
    <rect x="595" y="370" width="170" height="50" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="595" y="370" width="170" height="22" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="680" y="385" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">Active Memory</text>
  <text x="680" y="408" text-anchor="middle" font-size="8" fill="#64748b">对话前阻塞式召回</text>

  <!-- Bottom tip -->
  <rect x="140" y="432" width="520" height="22" rx="11" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="400" y="447" text-anchor="middle" font-size="10" fill="#15803d">💡 检疫是进程级 — 一旦 Engine 被检疫，当前 Gateway 生命周期内不会恢复</text>
</svg>
